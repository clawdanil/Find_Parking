<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#F8FAFC">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ParkMe">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>ParkMe – Find Free Street Parking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:  #111118;
      --accentH: #2A2A3A;
      --green:   #16A34A;
      --amber:   #B45309;
      --red:     #DC2626;
      --text:    rgba(10,10,20,.88);
      --t80:     rgba(10,10,20,.65);
      --t55:     rgba(10,10,20,.44);
      --t30:     rgba(10,10,20,.24);
      --t12:     rgba(10,10,20,.08);
      --t06:     rgba(10,10,20,.04);
      --w100:    rgba(255,255,255,1);
      --w80:     rgba(255,255,255,.80);
      --w60:     rgba(255,255,255,.60);
      --w30:     rgba(255,255,255,.30);
      --glass:   rgba(255,255,255,.75);
      --glassH:  rgba(255,255,255,.95);
      --border:  rgba(10,10,20,.07);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #FFFFFF;
      min-height: 100vh;
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .page-wrap { overflow-x: hidden; width: 100%; }

    /* ── Pure white glass background ─────────────────────────────────────── */
    .bg-scene {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: #FFFFFF;
    }
    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(140px);
      opacity: .10;
      animation: orbDrift 22s ease-in-out infinite alternate;
    }
    .bg-orb-1 { width: 70vw; height: 70vw; top: -20%; left: -15%; background: radial-gradient(circle, #E8E8F0, #F4F4F8); animation-duration: 22s; }
    .bg-orb-2 { width: 60vw; height: 60vw; top: -5%;  right: -15%; background: radial-gradient(circle, #F0EEF8, #F8F6FA); animation-duration: 18s; animation-delay: -6s; }
    .bg-orb-3 { width: 55vw; height: 55vw; bottom: 0; left: 15%;  background: radial-gradient(circle, #EEF0F8, #F4F4F8); animation-duration: 25s; animation-delay: -10s; }
    @keyframes orbDrift {
      from { transform: translate(0,0) scale(1);   }
      to   { transform: translate(5vw,6vh) scale(1.12); }
    }

    /* ── Hero ──────────────────────────────────────────────────────────── */
    .hero {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 88px 24px 72px;
      width: 100%;
      box-sizing: border-box;
      -webkit-transform: translateZ(0);
    }

    /* ── Logo pill ─────────────────────────────────────────────────────── */
    .logo-pill {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      padding: 12px 22px 12px 12px;
      background: rgba(255,255,255,.85);
      backdrop-filter: blur(60px) saturate(160%);
      -webkit-backdrop-filter: blur(60px) saturate(160%);
      border: 1px solid rgba(10,10,20,.07);
      border-radius: 100px;
      box-shadow:
        0 4px 24px rgba(10,10,20,.06),
        0 1px 6px rgba(10,10,20,.04),
        inset 0 1.5px 0 rgba(255,255,255,1);
      margin-bottom: 40px;
    }

    /* Glass app-icon P mark */
    .logo-icon {
      width: 52px; height: 52px;
      border-radius: 14px;
      background: linear-gradient(145deg, #1D4ED8 0%, #2563EB 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.55rem; font-weight: 900; color: #fff;
      box-shadow:
        0 4px 20px rgba(37,99,235,.35),
        inset 0 1px 0 rgba(255,255,255,.40),
        inset 0 -1px 0 rgba(0,0,0,.12);
      flex-shrink: 0;
      letter-spacing: -1px;
    }

    /* Text col */
    .logo-text-col {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
    }

    .logo-name-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-name {
      font-size: 1.75rem;
      font-weight: 900;
      letter-spacing: -1.2px;
      line-height: 1;
      color: var(--text);
    }
    .logo-name em { font-style: normal; color: rgba(10,10,20,.40); }

    /* Subtle "fun" badge — professional but playful */
    .fun-tag {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px 3px 9px;
      background: rgba(10,10,20,.05);
      border: 1px solid rgba(10,10,20,.09);
      border-radius: 100px;
      font-size: .68rem;
      font-weight: 800;
      font-style: italic;
      color: rgba(10,10,20,.42);
      letter-spacing: .3px;
      transform: rotate(-4deg) translateY(-1px);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      white-space: nowrap;
    }

    .logo-sub {
      font-size: .60rem;
      font-weight: 700;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: var(--t30);
      padding-left: 1px;
    }

    /* ── Hero headline ─────────────────────────────────────────────────── */
    .hero-headline {
      font-size: clamp(1.75rem, 4vw, 2.6rem);
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1.15;
      color: var(--text);
      margin-bottom: 16px;
    }
    .hero-headline .accent-word {
      background: linear-gradient(135deg, rgba(10,10,20,.80) 0%, rgba(10,10,20,.55) 55%, rgba(10,10,20,.70) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Headline slide-in animation ───────────────────────────────────── */
    @keyframes carSlide {
      0%   { opacity: 0; transform: translateX(-140px); }
      65%  { opacity: 1; transform: translateX(12px); }   /* overshoot — car braking */
      78%  { transform: translateX(-5px); }               /* tiny rebound */
      88%  { transform: translateX(3px); }                /* settles */
      100% { opacity: 1; transform: translateX(0); }
    }

    .hero-line-1 {
      display: block;
      opacity: 0;
      animation: carSlide 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.15s forwards;
    }
    .hero-line-2 {
      display: block;
      opacity: 0;
      animation: carSlide 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.42s forwards;
    }

    .hero-sub {
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--t55);
      max-width: 400px;
      margin: 0 auto;
      line-height: 1.65;
    }

    /* ── Glass mixin (reused) ──────────────────────────────────────────── */
    .glass-panel {
      background: var(--glass);
      backdrop-filter: blur(48px) saturate(160%);
      -webkit-backdrop-filter: blur(48px) saturate(160%);
      border: 1px solid rgba(10,10,20,.07);
      box-shadow:
        0 20px 48px rgba(10,10,20,.06),
        0 4px 12px rgba(10,10,20,.04),
        inset 0 1.5px 0 rgba(255,255,255,1);
    }

    /* ── Search card ───────────────────────────────────────────────────── */
    .search-section {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 760px;
      margin-left: auto;
      margin-right: auto;
      padding: 0 20px 52px;
      box-sizing: border-box;
      /* Prevent iOS from shifting content left */
      -webkit-transform: translateZ(0);
    }

    .search-card {
      border-radius: 48px;
      padding: 26px 26px 22px;
    }

    .search-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .input-group label {
      font-size: .62rem;
      font-weight: 800;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: var(--t30);
      padding-left: 4px;
    }

    .input-field {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,.90);
      border: 1px solid rgba(10,10,20,.08);
      border-radius: 16px;
      font-size: .93rem;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      color: var(--text);
      outline: none;
      box-shadow: inset 0 1px 3px rgba(10,10,20,.04);
      transition: all .2s;
    }
    .input-field::placeholder { color: var(--t30); font-weight: 500; }
    /* Suppress Safari autofill / contacts icons that misalign the input */
    .input-field::-webkit-contacts-auto-fill-button,
    .input-field::-webkit-credentials-auto-fill-button,
    .input-field::-webkit-textfield-decoration-container { display: none !important; }
    .input-field:focus {
      background: rgba(255,255,255,1);
      border-color: rgba(10,10,20,.18);
      box-shadow: 0 0 0 4px rgba(10,10,20,.05), inset 0 1px 3px rgba(10,10,20,.03);
    }

    .search-btn {
      padding: 13px 24px;
      background: linear-gradient(135deg, #111118 0%, #2A2A3A 100%);
      color: #fff;
      border: none;
      border-radius: 16px;
      font-family: 'Inter', sans-serif;
      font-size: .92rem;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: .2px;
      box-shadow: 0 4px 18px rgba(10,10,20,.22), inset 0 1px 0 rgba(255,255,255,.12);
      transition: transform .18s, box-shadow .18s, opacity .18s;
    }
    .search-btn:hover   { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(10,10,20,.28); }
    .search-btn:active  { transform: translateY(0); }
    .search-btn:disabled { opacity: .35; cursor: default; transform: none; box-shadow: none; }

    .location-btn {
      width: 100%;
      margin-top: 10px;
      padding: 11px 16px;
      background: rgba(255,255,255,.70);
      border: 1px solid rgba(10,10,20,.07);
      border-radius: 14px;
      color: var(--t55);
      font-family: 'Inter', sans-serif;
      font-size: .85rem;
      font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      gap: 7px;
      transition: background .18s, color .18s, border-color .18s;
    }
    .location-btn:hover    { background: rgba(255,255,255,1); border-color: rgba(10,10,20,.14); color: var(--text); }
    .location-btn:disabled { opacity: .35; cursor: default; }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 16px;
    }
    .chips-label {
      font-size: .60rem; font-weight: 800;
      letter-spacing: 1.6px; text-transform: uppercase;
      color: var(--t30); width: 100%; padding-left: 4px;
    }
    .chip {
      padding: 6px 16px;
      border: 1px solid rgba(10,10,20,.08);
      border-radius: 100px;
      background: rgba(255,255,255,.70);
      font-size: .77rem;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      color: var(--t55);
      cursor: pointer;
      transition: all .18s;
    }
    .chip:hover {
      background: rgba(255,255,255,1);
      border-color: rgba(10,10,20,.15);
      color: var(--text);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(10,10,20,.08);
    }

    /* ── Feature tiles ─────────────────────────────────────────────────── */
    .feature-tiles {
      margin-top: 18px;
      border-top: 1px solid rgba(10,10,20,.06);
      padding-top: 16px;
    }
    .tiles-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .feature-tile {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 18px;
      border-radius: 100px;
      border: 1.5px solid rgba(10,10,20,.10);
      background: #F8FAFC;
      font-family: 'Inter', sans-serif;
      font-size: .80rem;
      font-weight: 700;
      color: var(--t55);
      cursor: pointer;
      transition: all .18s;
      white-space: nowrap;
    }
    .feature-tile:hover {
      border-color: #2563EB;
      color: #2563EB;
      background: rgba(37,99,235,.05);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(37,99,235,.12);
    }
    .feature-tile.active {
      background: linear-gradient(135deg, #2563EB 0%, #4F46E5 100%);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 4px 16px rgba(37,99,235,.30);
    }
    .feature-tile.active:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37,99,235,.38); }

    /* ── Weather pill ──────────────────────────────────────────────────── */
    .weather-pill {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-top: 22px;
      padding: 10px 20px 10px 10px;
      background: rgba(255,255,255,.82);
      backdrop-filter: blur(40px) saturate(160%);
      -webkit-backdrop-filter: blur(40px) saturate(160%);
      border: 1px solid rgba(10,10,20,.07);
      border-radius: 100px;
      box-shadow: 0 4px 20px rgba(10,10,20,.06), inset 0 1.5px 0 rgba(255,255,255,1);
      transition: opacity .35s;
    }
    .weather-pill.loading { opacity: .55; }
    .w-icon-wrap {
      width: 42px; height: 42px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .w-svg-icon { width: 42px; height: 42px; }
    .w-info { display: flex; flex-direction: column; align-items: flex-start; gap: 1px; }
    .w-top-row { display: flex; align-items: baseline; gap: 6px; }
    .w-temp {
      font-size: 1.1rem; font-weight: 800; color: var(--text); line-height: 1;
    }
    .w-desc {
      font-size: .72rem; font-weight: 600; color: var(--t55); text-transform: capitalize;
    }
    .w-city {
      font-size: .62rem; font-weight: 700; color: var(--t30); letter-spacing: .3px;
    }
    .w-extras {
      display: flex; flex-direction: column; gap: 2px; align-items: flex-end;
      padding-left: 8px; border-left: 1px solid rgba(10,10,20,.09); margin-left: 4px;
    }
    .w-extra { font-size: .68rem; font-weight: 600; color: var(--t55); white-space: nowrap; }

    /* animated SVG weather icons */
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes wfloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
    @keyframes wbob   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-2px)} }
    @keyframes wpulse { 0%,100%{opacity:1} 50%{opacity:.6} }
    @keyframes wdrop  { 0%{transform:translateY(-4px);opacity:0} 60%{opacity:1} 100%{transform:translateY(10px);opacity:0} }
    @keyframes wflake { 0%{transform:rotate(0) translateY(-2px)} 100%{transform:rotate(180deg) translateY(6px)} }
    @keyframes wzap   { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.9)} }
    .wicon-spin  { animation: spin    1.1s linear infinite; }
    .wicon-float { animation: wfloat  3s ease-in-out infinite; }
    .wicon-bob   { animation: wbob    2.5s ease-in-out infinite; }
    .wicon-pulse { animation: wpulse  2s ease-in-out infinite; }
    .wicon-zap   { animation: wzap    1s ease-in-out infinite; }

    /* ── Stats bar ─────────────────────────────────────────────────────── */
    .stats-bar {
      position: relative; z-index: 10;
      width: 100%; max-width: 760px; margin: 0 auto 18px; padding: 0 20px; box-sizing: border-box;
      animation: fadeUp .4s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .stats-inner {
      border-radius: 18px;
      padding: 12px 22px;
      display: flex; flex-wrap: wrap;
      gap: 4px 20px;
      align-items: center; justify-content: center;
      background: rgba(255,255,255,.80);
      border: 1px solid rgba(10,10,20,.07);
      backdrop-filter: blur(20px);
    }
    .stat-item { font-size: .78rem; font-weight: 600; color: var(--t55); display: flex; align-items: center; gap: 6px; }
    .stat-item strong { color: var(--text); font-weight: 800; }
    .stat-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green); flex-shrink: 0;
      animation: dotBlink 2s ease-in-out infinite;
    }
    @keyframes dotBlink {
      0%,100% { opacity:1; box-shadow: 0 0 6px var(--green); }
      50%      { opacity:.3; box-shadow:none; }
    }
    .stats-div { color: var(--t12); }

    /* ── Results layout ────────────────────────────────────────────────── */
    .results-wrapper {
      position: relative; z-index: 10;
      width: 100%; max-width: 820px; margin: 0 auto 100px; padding: 0 20px; box-sizing: border-box;
      display: grid; grid-template-columns: 1fr; gap: 16px; align-items: start;
    }
    .results-wrapper.has-map { max-width: 1360px; grid-template-columns: 1fr 400px; }
    #results { display: flex; flex-direction: column; gap: 14px; min-width: 0; }

    /* ── Map panel ─────────────────────────────────────────────────────── */
    .map-panel {
      position: sticky; top: 24px;
      border-radius: 26px; overflow: hidden;
      border: 1px solid rgba(10,10,20,.07);
      box-shadow: 0 8px 32px rgba(10,10,20,.07);
    }
    .map-header {
      padding: 13px 18px;
      font-size: .77rem; font-weight: 700; color: var(--t55);
      background: rgba(255,255,255,.88);
      backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px);
      border-bottom: 1px solid rgba(10,10,20,.06);
      display: flex; align-items: center; gap: 7px;
    }
    .map-header span { color: var(--text); }
    #map { width: 100%; height: 540px; }
    .leaflet-popup-content-wrapper {
      background: rgba(255,255,255,.95) !important;
      backdrop-filter: blur(32px) !important;
      border: 1px solid rgba(10,10,20,.07) !important;
      border-radius: 18px !important;
      box-shadow: 0 8px 32px rgba(10,10,20,.10) !important;
      padding: 0 !important;
    }
    .leaflet-popup-content { margin: 0 !important; }
    .leaflet-popup-tip { background: rgba(255,255,255,.95) !important; }

    /* ── Loader ────────────────────────────────────────────────────────── */
    .loading-state {
      display: flex; flex-direction: column;
      align-items: center; padding: 72px 16px; gap: 20px;
    }
    .meter-light {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 8px var(--accent);
      animation: meterBlink 1s ease-in-out infinite; margin-bottom: -2px;
    }
    @keyframes meterBlink {
      0%,100% { opacity:1; box-shadow: 0 0 10px var(--accent); }
      50%      { opacity:.2; box-shadow:none; }
    }
    .meter-head {
      width: 56px; height: 72px;
      background: rgba(255,255,255,.06); backdrop-filter: blur(20px);
      border-radius: 12px 12px 6px 6px;
      border: 1px solid rgba(255,255,255,.10);
      position: relative; overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,.30);
    }
    .meter-screen {
      position: absolute; top:9px; left:8px; right:8px; bottom:13px;
      background: rgba(0,0,0,.30); border-radius: 6px;
      overflow: hidden; display: flex; align-items: center; justify-content: center;
    }
    .meter-fill-bar {
      position: absolute; bottom:0; left:0; right:0;
      background: linear-gradient(to top, var(--accent), rgba(59,130,246,.35));
      animation: meterFillUp 2.2s ease-in-out infinite;
    }
    @keyframes meterFillUp {
      0%   { height:0%; }
      60%  { height:100%; }
      85%  { height:100%; }
      100% { height:0%; }
    }
    .meter-p {
      position: relative; z-index:2;
      font-family:'Inter',sans-serif; font-size:22px; font-weight:900;
      color: rgba(255,255,255,.80); user-select:none;
    }
    .meter-coin-slot {
      position:absolute; bottom:4px; left:50%; transform:translateX(-50%);
      width:18px; height:2px; background:rgba(255,255,255,.15); border-radius:2px;
    }
    .meter-neck { width:10px; height:7px; background:rgba(255,255,255,.08); margin:0 auto; }
    .meter-pole {
      width:6px; height:44px;
      background: linear-gradient(to right, rgba(255,255,255,.08), rgba(255,255,255,.05), rgba(255,255,255,.08));
      border-radius:0 0 4px 4px; margin:0 auto;
    }
    .loading-msg {
      font-size:.92rem; font-weight:600; color:var(--t55);
      animation: msgIn .3s ease both;
    }
    @keyframes msgIn {
      from { opacity:0; transform:translateY(5px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── Result cards ──────────────────────────────────────────────────── */
    .parking-card {
      background: rgba(255,255,255,.80);
      backdrop-filter: blur(40px) saturate(160%);
      -webkit-backdrop-filter: blur(40px) saturate(160%);
      border: 1px solid rgba(10,10,20,.07);
      border-radius: 24px;
      padding: 20px 22px;
      position: relative; overflow: hidden;
      display: flex; gap: 16px; align-items: flex-start;
      animation: cardIn .5s cubic-bezier(.22,.68,0,1.2) both;
      animation-delay: var(--delay, 0s);
      transition: background .2s, box-shadow .2s, transform .2s, border-color .2s;
      box-shadow: 0 2px 12px rgba(10,10,20,.05), inset 0 1.5px 0 rgba(255,255,255,1);
    }
    .parking-card::before {
      content:''; position:absolute;
      left:0; top:14px; bottom:14px;
      width:3.5px; border-radius:0 3px 3px 0;
      background: var(--status-color, var(--green)); opacity:.85;
    }
    .parking-card:hover {
      background: rgba(255,255,255,.97);
      border-color: rgba(10,10,20,.11);
      box-shadow: 0 10px 32px rgba(10,10,20,.08), inset 0 1.5px 0 rgba(255,255,255,1);
      transform: translateY(-3px);
    }
    @keyframes cardIn {
      from { opacity:0; transform:translateY(14px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .spot-number {
      font-size: 2.1rem; font-weight:900;
      color: var(--status-color, var(--green));
      opacity:.12; min-width:48px; line-height:1;
      padding-top:2px; text-align:center;
      flex-shrink:0; letter-spacing:-2px;
    }
    .card-body { flex:1; min-width:0; }
    .card-header-row {
      display:flex; justify-content:space-between;
      align-items:flex-start; gap:10px; margin-bottom:8px; flex-wrap:wrap;
    }
    .card-address {
      font-size:.96rem; font-weight:800;
      line-height:1.4; color:var(--text); letter-spacing:-.2px;
    }
    .card-side { font-weight:500; color:var(--t55); font-size:.83rem; }
    .card-landmark { font-size:.77rem; color:var(--t30); margin-top:3px; font-style:italic; }
    .status-badge {
      font-size:.62rem; font-weight:800;
      padding:3px 11px; border-radius:100px;
      white-space:nowrap; letter-spacing:.5px; flex-shrink:0;
    }
    .card-streetview {
      width:100%; height:220px; object-fit:cover; object-position: center center;
      border-radius:14px; margin:12px 0 4px; display:block;
      background:rgba(255,255,255,.70); border:1px solid rgba(10,10,20,.07);
    }
    .sv-disclaimer { font-size:.69rem; color:var(--t30); font-style:italic; margin:0 0 12px; }
    .card-details { display:flex; flex-wrap:wrap; gap:6px; }
    .detail-item {
      display:flex; align-items:center; gap:5px;
      font-size:.72rem; font-weight:600; color:var(--t55);
      background:rgba(255,255,255,.75); padding:4px 11px;
      border-radius:100px; border:1px solid rgba(10,10,20,.07);
      white-space:nowrap;
    }

    /* ── Report ────────────────────────────────────────────────────────── */
    .card-report   { margin-top:14px; border-top:1px solid rgba(10,10,20,.07); padding-top:13px; }
    .report-status { min-height:22px; margin-bottom:8px; }
    .report-status-badge {
      display:inline-flex; align-items:center;
      font-size:.73rem; font-weight:700;
      padding:3px 11px; border-radius:100px; border:1px solid;
    }
    .report-actions { display:flex; gap:8px; }
    .report-btn {
      flex:1; padding:8px 10px; border-radius:12px;
      border:1px solid rgba(10,10,20,.07);
      font-size:.79rem; font-weight:700;
      font-family:'Inter',sans-serif; cursor:pointer;
      background:rgba(255,255,255,.70); color:var(--t55);
      transition: all .15s;
    }
    .report-btn:hover    { transform:translateY(-1px); }
    .report-btn:disabled { opacity:.3; cursor:default; transform:none; }
    .report-free:hover  { background:rgba(22,163,74,.10); border-color:rgba(22,163,74,.35); color:#15803D; }
    .report-taken:hover { background:rgba(220,38,38,.08); border-color:rgba(220,38,38,.28); color:#B91C1C; }

    /* ── Messages ──────────────────────────────────────────────────────── */
    .msg { text-align:center; padding:64px 16px; color:var(--t55); }
    .msg.error { color:rgba(220,38,38,.8); }
    .msg-icon { font-size:2.5rem; margin-bottom:14px; }
    .msg p { font-size:.92rem; font-weight:600; }

    /* ── Footer ────────────────────────────────────────────────────────── */
    footer {
      position:relative; z-index:1;
      text-align:center; padding:28px 16px;
      font-size:.76rem; font-weight:600;
      color:var(--t30); letter-spacing:.2px;
      border-top:1px solid rgba(10,10,20,.07);
    }
    footer strong { color:var(--t55); }

    /* ── Address autocomplete ──────────────────────────────────────────── */
    .ac-wrap { position: relative; }
    .ac-dropdown {
      position: absolute;
      top: calc(100% + 4px); left: 0; right: 0;
      z-index: 200;
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(40px) saturate(160%);
      -webkit-backdrop-filter: blur(40px) saturate(160%);
      border: 1px solid rgba(10,10,20,.08);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 16px 48px rgba(10,10,20,.10);
    }
    .ac-item {
      display: flex; flex-direction: column; gap: 1px;
      padding: 11px 16px;
      cursor: pointer;
      border-bottom: 1px solid rgba(10,10,20,.06);
      transition: background .12s;
    }
    .ac-item:last-child { border-bottom: none; }
    .ac-item:hover, .ac-item.focused { background: rgba(10,10,20,.04); }
    .ac-main { font-size: .84rem; font-weight: 600; color: var(--text); }
    .ac-sub  { font-size: .70rem; color: var(--t55); }

    /* ── Tabs ──────────────────────────────────────────────────────────── */
    .tabs-outer {
      position: relative; z-index: 10;
      width: 100%; max-width: 820px;
      margin: 0 auto 10px; padding: 0 20px;
      box-sizing: border-box;
    }
    .tabs-bar {
      display: flex; gap: 5px;
      background: rgba(255,255,255,.78);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border: 1px solid rgba(10,10,20,.07);
      border-radius: 100px;
      padding: 4px;
      margin-bottom: 14px;
      box-shadow: 0 2px 10px rgba(10,10,20,.05);
    }
    .tab-btn {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 5px;
      padding: 8px 10px;
      border: none; border-radius: 100px;
      background: transparent;
      font-family: 'Inter', sans-serif;
      font-size: .75rem; font-weight: 700;
      color: var(--t55);
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }
    .tab-btn.active {
      background: linear-gradient(135deg, #111118, #2A2A3A);
      color: #fff;
      box-shadow: 0 2px 12px rgba(10,10,20,.20);
    }
    .tab-count {
      font-size: .62rem; font-weight: 800;
      padding: 1px 6px; border-radius: 100px;
      background: rgba(10,10,20,.07);
      min-width: 18px; text-align: center;
    }
    .tab-btn.active .tab-count { background: rgba(255,255,255,.25); }

    /* ── Garage / lot placeholder ───────────────────────────────────────── */
    .card-garage-thumb {
      width: 100%; height: 100px;
      background: rgba(255,255,255,.70);
      border: 1px solid rgba(10,10,20,.07);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin: 8px 0;
      font-size: .85rem; font-weight: 600; color: var(--t55);
    }
    .card-garage-thumb span:first-child { font-size: 2rem; }

    /* ── Cost badge ─────────────────────────────────────────────────────── */
    .cost-badge {
      display: inline-flex; align-items: center;
      margin: 4px 0 8px;
      padding: 4px 12px;
      background: rgba(180,83,9,.07);
      border: 1px solid rgba(180,83,9,.18);
      border-radius: 100px;
      font-size: .75rem; font-weight: 700;
      color: #92400E;
    }

    /* ── Mobile ────────────────────────────────────────────────────────── */
    @media (max-width:640px) {
      .hero              { padding:64px 20px 52px; }
      .logo-pill         { padding:11px 18px 11px 11px; gap:10px; margin-bottom:28px; }
      .logo-icon         { width:44px; height:44px; font-size:1.25rem; }
      .logo-name         { font-size:1.45rem; }
      .fb                { width:24px; height:24px; font-size:.76rem; }
      .hero-headline     { letter-spacing:-0.5px; }
      .search-card       { padding:18px 16px; border-radius:40px; }
      .search-row        { flex-direction:column; align-items:stretch; }
      .search-btn        { width:100%; padding:14px; }
      .stats-inner       { gap:5px 12px; padding:10px 14px; }
      .stats-div         { display:none; }
      .parking-card      { gap:10px; padding:16px; }
      .spot-number       { font-size:1.7rem; min-width:40px; }
      .results-wrapper.has-map { grid-template-columns:1fr; max-width:820px; }
      .map-panel         { position:static; }
      #map               { height:280px; }
    }

  </style>
</head>
<body>
<div class="page-wrap">

  <!-- iOS mesh bg -->
  <div class="bg-scene" aria-hidden="true">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
  </div>

  <!-- Hero -->
  <header class="hero">

    <!-- Glass logo pill -->
    <div class="logo-pill">
      <div class="logo-icon">P</div>
      <div class="logo-text-col">
        <div class="logo-name-row">
          <span class="logo-name">Park<em>Me</em></span>
          <span class="fun-tag">fun</span>
        </div>
        <span class="logo-sub" style="text-transform:none;letter-spacing:.5px;">Park, Fun &amp; More</span>
      </div>
    </div>

    <h1 class="hero-headline">
      <span class="hero-line-1">Your Local</span>
      <span class="hero-line-2 accent-word">Universe.</span>
    </h1>

    <!-- Weather pill -->
    <div class="weather-pill" id="weather-card">
      <div class="w-icon-wrap" id="w-icon-wrap">
        <div class="w-svg-icon" id="w-icon">
          <!-- default spinner -->
          <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" class="wicon-spin">
            <circle cx="24" cy="24" r="20" stroke="rgba(10,10,20,.08)" stroke-width="4"/>
            <path d="M44 24a20 20 0 0 0-20-20" stroke="rgba(10,10,20,.40)" stroke-width="4" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
      <div class="w-info">
        <div class="w-top-row">

          <span class="w-desc" id="w-desc">Loading…</span>

        <div class="w-city" id="w-city">Detecting location…</div>

  </header>

  <!-- Search -->
  <section class="search-section">
    <div class="search-card glass-panel">
      <div class="search-row">
        <div class="input-group ac-wrap">
          <label for="street-input">Address, Street or Landmark</label>
          <input id="street-input" class="input-field" type="text" placeholder="Search address, street or landmark…" autocomplete="off" />
          <div class="ac-dropdown" id="ac-dropdown" hidden></div>
        </div>
        <button id="search-btn" class="search-btn">Search →</button>
      </div>
      <button id="location-btn" class="location-btn">📍 Use My Current Location</button>
      <div class="chips">
        <span class="chips-label">Popular cities</span>
        <button class="chip" data-city="Jersey City, NJ">Jersey City, NJ</button>
        <button class="chip" data-city="New York, NY">New York, NY</button>
        <button class="chip" data-city="Chicago, IL">Chicago, IL</button>
        <button class="chip" data-city="Boston, MA">Boston, MA</button>
        <button class="chip" data-city="Austin, TX">Austin, TX</button>
      </div>

      <!-- Feature tiles -->
      <div class="feature-tiles" id="feature-tiles">
        <span class="chips-label">Explore nearby</span>
        <div class="tiles-row">
          <button class="feature-tile active" data-feature="parking">🅿️ Parking</button>
          <button class="feature-tile" data-feature="food">🍔 Food</button>
          <button class="feature-tile" data-feature="bars">🍺 Bars</button>
          <button class="feature-tile" data-feature="coffee">☕ Coffee</button>
          <button class="feature-tile" data-feature="gym">💪 Gym</button>
          <button class="feature-tile" data-feature="shopping">🛒 Shopping</button>
        </div>
      </div>

  </section>

  <!-- Stats -->
  <div class="stats-bar" id="stats-bar" hidden>
    <div class="stats-inner glass-panel">
      <span class="stat-item">
        <span class="stat-dot"></span>
        <strong id="stat-count">0</strong>&nbsp;spots found
      </span>
      <span class="stats-div">·</span>
      <span class="stat-item">📍 Near <strong id="stat-street">–</strong></span>
      <span class="stats-div">·</span>
      <span class="stat-item">🏙️ <strong id="stat-city">–</strong></span>
      <span class="stats-div">·</span>
      <span class="stat-item">🕐 <strong id="stat-time">–</strong></span>
    </div>
  </div>

  <!-- Result tabs (outside grid so they always show full-width) -->
  <div class="tabs-outer" id="results-tabs-outer" hidden>
    <div class="tabs-bar" id="results-tabs"></div>
  </div>

  <!-- Results + Map -->
  <div class="results-wrapper" id="results-wrapper">
    <div id="results"></div>
    <aside class="map-panel" id="map-panel" hidden>
      <div class="map-header">
        🗺 <span id="map-spot-count">0 spots</span> on map &nbsp;·&nbsp; click a pin for details
      </div>
      <div id="map"></div>
    </aside>
  </div>

  <!-- Footer -->
  <footer>
    <strong>ParkMe</strong> &ensp;·&ensp; © 2026 &ensp;·&ensp; Always verify posted signs before parking
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js?v=10"></script>

</div><!-- /.page-wrap -->

  <script>
    // Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.log('SW failed:', err));
      });
    }

    // ── Weather ─────────────────────────────────────────────────────────
    const WMO_DESC = {
      0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',
      45:'Foggy',48:'Icy fog',
      51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',
      61:'Light rain',63:'Rain',65:'Heavy rain',
      71:'Light snow',73:'Snow',75:'Heavy snow',77:'Snow grains',
      80:'Rain showers',81:'Heavy showers',82:'Violent showers',
      85:'Snow showers',86:'Heavy snow showers',
      95:'Thunderstorm',96:'Thunderstorm + hail',99:'Thunderstorm + heavy hail'
    };

    function weatherSVG(code) {
      // Sunny
      if ([0,1].includes(code)) return `
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" class="wicon-float">
          <circle cx="24" cy="24" r="9" fill="#FFD60A"/>
          <g stroke="#FFD60A" stroke-width="2.5" stroke-linecap="round">
            <line x1="24" y1="6" x2="24" y2="2"/>
            <line x1="24" y1="46" x2="24" y2="42"/>
            <line x1="6" y1="24" x2="2" y2="24"/>
            <line x1="46" y1="24" x2="42" y2="24"/>
            <line x1="11.5" y1="11.5" x2="8.7" y2="8.7"/>
            <line x1="39.3" y1="39.3" x2="36.5" y2="36.5"/>
            <line x1="36.5" y1="11.5" x2="39.3" y2="8.7"/>
            <line x1="8.7" y1="39.3" x2="11.5" y2="36.5"/>
          </g>
        </svg>`;
      // Partly cloudy
      if ([2].includes(code)) return `
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" class="wicon-bob">
          <circle cx="18" cy="22" r="7" fill="#FFD60A"/>
          <ellipse cx="28" cy="28" rx="11" ry="8" fill="white" stroke="rgba(0,0,0,.08)" stroke-width="1"/>
          <ellipse cx="20" cy="30" rx="8" ry="6" fill="white" stroke="rgba(0,0,0,.08)" stroke-width="1"/>
          <ellipse cx="34" cy="30" rx="7" ry="5.5" fill="white" stroke="rgba(0,0,0,.08)" stroke-width="1"/>
        </svg>`;
      // Overcast / cloudy
      if ([3].includes(code)) return `
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" class="wicon-float">
          <ellipse cx="26" cy="26" rx="13" ry="9" fill="#C8D6E5"/>
          <ellipse cx="18" cy="28" rx="9" ry="7" fill="#C8D6E5"/>
          <ellipse cx="34" cy="29" rx="8" ry="6" fill="#BCC9D8"/>
          <ellipse cx="26" cy="22" rx="10" ry="7" fill="#D8E4EF"/>
        </svg>`;
      // Foggy
      if ([45,48].includes(code)) return `
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" class="wicon-pulse">
          <rect x="8"  y="18" width="32" height="3" rx="1.5" fill="#A0B0C0" opacity=".9"/>
          <rect x="12" y="24" width="24" height="3" rx="1.5" fill="#A0B0C0" opacity=".7"/>
          <rect x="8"  y="30" width="32" height="3" rx="1.5" fill="#A0B0C0" opacity=".5"/>
        </svg>`;
      // Rain / drizzle / showers
      if ([51,53,55,61,63,65,80,81,82].includes(code)) return `
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" class="wicon-bob">
          <ellipse cx="24" cy="18" rx="12" ry="8" fill="#5E9ED6"/>
          <ellipse cx="16" cy="20" rx="8"  ry="6" fill="#5E9ED6"/>
          <ellipse cx="32" cy="20" rx="7"  ry="5.5" fill="#4A8FC4"/>
          <line x1="16" y1="30" x2="14" y2="38" stroke="#4A8FC4" stroke-width="2.5" stroke-linecap="round" style="animation:wdrop 1.1s ease-in infinite"/>
          <line x1="24" y1="30" x2="22" y2="38" stroke="#4A8FC4" stroke-width="2.5" stroke-linecap="round" style="animation:wdrop 1.1s ease-in .35s infinite"/>
          <line x1="32" y1="30" x2="30" y2="38" stroke="#4A8FC4" stroke-width="2.5" stroke-linecap="round" style="animation:wdrop 1.1s ease-in .7s infinite"/>
        </svg>`;
      // Snow
      if ([71,73,75,77,85,86].includes(code)) return `
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" class="wicon-bob">
          <ellipse cx="24" cy="18" rx="12" ry="8" fill="#A8C4DC"/>
          <ellipse cx="16" cy="20" rx="8"  ry="6" fill="#A8C4DC"/>
          <ellipse cx="32" cy="20" rx="7"  ry="5.5" fill="#98B4CC"/>
          <text x="14" y="40" font-size="10" fill="#5E9ED6" style="animation:wflake 2s linear infinite">❄</text>
          <text x="24" y="42" font-size="10" fill="#5E9ED6" style="animation:wflake 2s linear .7s infinite">❄</text>
          <text x="32" y="39" font-size="10" fill="#5E9ED6" style="animation:wflake 2s linear 1.4s infinite">❄</text>
        </svg>`;
      // Thunderstorm
      if ([95,96,99].includes(code)) return `
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" class="wicon-bob">
          <ellipse cx="24" cy="16" rx="13" ry="8" fill="#4A5568"/>
          <ellipse cx="16" cy="18" rx="9"  ry="7" fill="#4A5568"/>
          <ellipse cx="32" cy="18" rx="8"  ry="6" fill="#3D4A5C"/>
          <polygon points="26,26 20,36 24,36 22,46 32,32 27,32 30,26" fill="#FFD60A" class="wicon-zap"/>
        </svg>`;
      // Default
      return `<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <text x="4" y="38" font-size="36">🌡️</text></svg>`;
    }

    function renderWeather(data, cityLabel) {
      const c    = data.current;
      const code = c.weather_code ?? c.weathercode;
      document.getElementById('w-icon').innerHTML = weatherSVG(code);
      document.getElementById('w-temp').textContent = Math.round(c.temperature_2m) + '°F';
      document.getElementById('w-desc').textContent = WMO_DESC[code] ?? 'Unknown';
      document.getElementById('w-city').textContent = cityLabel;
      document.getElementById('w-wind').textContent = '💨 ' + Math.round(c.wind_speed_10m) + ' mph';
      document.getElementById('w-humidity').textContent = '💧 ' + Math.round(c.relative_humidity_2m) + '%';
      document.getElementById('weather-card').classList.remove('loading');
    }

    async function fetchWeather(lat, lon, cityLabel) {
      document.getElementById('weather-card').classList.add('loading');
      try {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
          + `&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m`
          + `&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto`;
        const res  = await fetch(url);
        const data = await res.json();
        renderWeather(data, cityLabel);
      } catch {
        document.getElementById('w-desc').textContent = 'Weather unavailable';
        document.getElementById('weather-card').classList.remove('loading');
      }
    }

    async function geocodeCity(cityStr) {
      const res  = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cityStr)}&count=1&language=en&format=json`);
      const data = await res.json();
      if (!data.results?.length) throw new Error('Not found');
      const r = data.results[0];
      return { lat: r.latitude, lon: r.longitude, label: r.name + (r.admin1 ? ', ' + r.admin1 : '') };
    }

    // ── Load weather: GPS first (accurate), IP as quick fallback ──────────
    (async () => {
      let gpsResolved = false;

      // 1. Try GPS immediately — most accurate, updates weather to real location
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(async pos => {
          gpsResolved = true;
          const { latitude: lat, longitude: lon } = pos.coords;
          try {
            // Use Google Geocoder if loaded, else Nominatim
            let lbl = 'Your Location';
            if (window._gmapsReady && window._geocoder) {
              await new Promise(resolve => {
                window._geocoder.geocode({ location: { lat, lng: lon } }, (results, status) => {
                  if (status === 'OK' && results?.[0]) {
                    const get = type => results[0].address_components.find(c => c.types.includes(type));
                    lbl = [get('locality')?.long_name || get('sublocality')?.long_name, get('administrative_area_level_1')?.short_name].filter(Boolean).join(', ') || lbl;
                  }
                  resolve();
                });
              });
            } else {
              const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
              const d = await r.json();
              lbl = d.address?.city || d.address?.town || d.address?.village || lbl;
            }
            fetchWeather(lat, lon, lbl);
          } catch { fetchWeather(lat, lon, 'Your Location'); }
        }, () => { /* GPS denied — IP fallback already ran */ }, { timeout: 8000, maximumAge: 60000 });
      }

      // 2. IP geolocation runs in parallel as fast fallback (may be inaccurate by ~10mi)
      setTimeout(async () => {
        if (gpsResolved) return; // GPS already succeeded, skip IP
        try {
          const res = await fetch('https://ipapi.co/json/');
          const d   = await res.json();
          if (d.latitude && d.longitude && !gpsResolved) {
            const label = [d.city, d.region_code].filter(Boolean).join(', ');
            fetchWeather(d.latitude, d.longitude, label || 'Nearby');
          }
        } catch {
          if (!gpsResolved) fetchWeather(40.7128, -74.0060, 'New York, NY');
        }
      }, 300); // slight delay so GPS has a chance to win first
    })();

    // Update weather when a city chip is clicked
    document.querySelectorAll('.chip[data-city]').forEach(btn => {
      btn.addEventListener('click', async () => {
        try {
          const { lat, lon, label } = await geocodeCity(btn.dataset.city);
          fetchWeather(lat, lon, label);
        } catch { /* ignore */ }
      });
    });
  </script>
</body>
</html>
