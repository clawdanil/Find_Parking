<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find Parking</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f7fa;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 24px 16px;
      text-align: center;
    }
    header h1 { font-size: 1.8rem; letter-spacing: -0.5px; }
    header p  { margin-top: 4px; color: #94a3b8; font-size: 0.9rem; }

    .search-bar {
      display: flex;
      gap: 8px;
      max-width: 600px;
      margin: 28px auto 0;
      padding: 0 16px;
    }
    .search-bar input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-bar input:focus { border-color: #6366f1; }
    .search-bar button {
      padding: 12px 22px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .search-bar button:hover  { background: #4f46e5; }
    .search-bar button:active { background: #4338ca; }

    #results {
      max-width: 600px;
      margin: 24px auto 48px;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Parking spot card ── */
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 18px 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .card h3 { font-size: 1rem; font-weight: 700; }
    .badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .badge.available   { background: #dcfce7; color: #166534; }
    .badge.unavailable { background: #fee2e2; color: #991b1b; }
    .card-meta { font-size: 0.85rem; color: #64748b; }
    .card-footer { display: flex; justify-content: space-between; margin-top: 4px; font-size: 0.85rem; }
    .card-footer .price  { font-weight: 700; color: #1a1a2e; }
    .card-footer .type   { color: #94a3b8; text-transform: capitalize; }

    /* ── Skeleton loader ── */
    .skeleton {
      pointer-events: none;
      animation: pulse 1.4s ease-in-out infinite;
    }
    .skel-line {
      background: #e2e8f0;
      border-radius: 6px;
      height: 14px;
    }
    .skel-line.w-70 { width: 70%; }
    .skel-line.w-50 { width: 50%; }
    .skel-line.w-35 { width: 35%; }
    .skel-line.w-20 { width: 20%; height: 22px; border-radius: 20px; }
    .skel-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }

    @keyframes pulse {
      0%, 100% { opacity: 1;   }
      50%       { opacity: 0.45; }
    }

    /* ── Error / empty state ── */
    .msg {
      text-align: center;
      padding: 40px 16px;
      color: #64748b;
    }
    .msg.error { color: #b91c1c; }
    .msg .icon { font-size: 2rem; margin-bottom: 8px; }
    .msg p { font-size: 0.95rem; }
  </style>
</head>
<body>

  <header>
    <h1>Find Parking</h1>
    <p>AI-powered nearby parking search</p>
  </header>

  <div class="search-bar">
    <input id="location" type="text" placeholder="Enter address or landmark…" autocomplete="off" />
    <button id="search-btn">Search</button>
  </div>

  <div id="results"></div>

  <script src="app.js"></script>
</body>
</html>
