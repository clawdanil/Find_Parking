<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ParkMe – Find Free Street Parking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:  #00C853;
      --amber:  #FFB300;
      --red:    #F44336;
      --navy:   #0F172A;
      --navy2:  #1E293B;
      --slate:  #334155;
      --text:   #0F172A;
      --muted:  #64748B;
      --border: #E2E8F0;
      --white:  #FFFFFF;
      --bg:     #F8FAFC;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Animated dot grid ─────────────────────────────────────────────── */
    .bg-dots {
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #94a3b8 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.1;
      animation: scrollDots 28s linear infinite;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes scrollDots {
      from { background-position: 0 0; }
      to   { background-position: 28px 28px; }
    }

    /* ── Hero ──────────────────────────────────────────────────────────── */
    .hero {
      position: relative;
      background: linear-gradient(155deg, #0a0f1e 0%, #0F172A 40%, #112240 70%, #0a0f1e 100%);
      padding: 64px 16px 96px;
      text-align: center;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -100px; left: 50%;
      transform: translateX(-50%);
      width: 640px; height: 640px;
      background: radial-gradient(circle, rgba(0,200,83,.14) 0%, transparent 65%);
      pointer-events: none;
    }

    .hero-logo {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }
    .logo-icon {
      width: 68px; height: 68px;
      position: relative;
      flex-shrink: 0;
    }
    .logo-icon svg { position: absolute; top: 0; left: 0; }

    @keyframes pulseRing {
      0%, 100% { transform: scale(0.92); opacity: 0.55; }
      50%       { transform: scale(1.08); opacity: 0.18; }
    }
    .ring1 { animation: pulseRing 2.6s ease-in-out infinite;      transform-origin: 34px 34px; }
    .ring2 { animation: pulseRing 2.6s ease-in-out infinite 0.9s; transform-origin: 34px 34px; }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 3.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #00C853 0%, #00e5ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1.5px;
    }
    .hero-tagline {
      font-size: 1.15rem;
      color: #94A3B8;
      font-weight: 400;
      margin-top: 4px;
    }

    /* ── Search card ───────────────────────────────────────────────────── */
    .search-section {
      position: relative;
      z-index: 10;
      max-width: 740px;
      margin: -48px auto 0;
      padding: 0 16px;
    }
    .search-card {
      background: var(--white);
      border-radius: 22px;
      padding: 28px 28px 22px;
      box-shadow:
        0 24px 64px rgba(0,0,0,.14),
        0 4px 18px rgba(0,0,0,.07),
        0 0 0 1px rgba(0,0,0,.04);
    }
    .search-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    .input-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .input-group label {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .input-field {
      width: 100%;
      padding: 13px 16px;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 0.96rem;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.22s, box-shadow 0.22s, background 0.22s;
    }
    .input-field::placeholder { color: #b0bec5; }
    .input-field:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 4px rgba(0,200,83,.13);
      background: white;
    }
    .search-btn {
      padding: 13px 28px;
      background: linear-gradient(135deg, #00C853 0%, #00897B 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: 0.3px;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
    }
    .search-btn:hover  { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(0,200,83,.38); }
    .search-btn:active { transform: translateY(0); }
    .search-btn:disabled { opacity: 0.55; cursor: default; transform: none; box-shadow: none; }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 18px;
    }
    .chips-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      width: 100%;
      margin-bottom: 2px;
    }
    .chip {
      padding: 6px 14px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      background: white;
      font-size: 0.79rem;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.18s, color 0.18s, background 0.18s, transform 0.15s;
    }
    .chip:hover {
      border-color: var(--green);
      color: #00a844;
      background: rgba(0,200,83,.05);
      transform: translateY(-1px);
    }
    .location-btn {
      width: 100%;
      margin-top: 14px;
      padding: 10px 16px;
      background: transparent;
      border: 1.5px dashed var(--green);
      border-radius: 10px;
      color: var(--green);
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.18s, opacity 0.18s;
    }
    .location-btn:hover    { background: rgba(0,200,83,.07); }
    .location-btn:disabled { opacity: 0.5; cursor: default; }

    /* ── Stats bar ─────────────────────────────────────────────────────── */
    .stats-bar {
      max-width: 740px;
      margin: 22px auto 0;
      padding: 0 16px;
      animation: fadeUp 0.4s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .stats-inner {
      background: var(--navy);
      border-radius: 14px;
      padding: 14px 22px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px 20px;
      align-items: center;
      justify-content: center;
    }
    .stat-item {
      font-size: 0.83rem;
      color: #94A3B8;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .stat-item strong { color: white; font-weight: 600; }
    .stat-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
      animation: dotBlink 1.6s ease-in-out infinite;
    }
    @keyframes dotBlink {
      0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--green); }
      50%       { opacity: 0.35; box-shadow: none; }
    }
    .stats-div { color: #2d3f55; font-size: 1.1rem; }

    /* ── Results ───────────────────────────────────────────────────────── */
    #results {
      max-width: 740px;
      margin: 22px auto 64px;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── Parking meter loader ──────────────────────────────────────────── */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 52px 16px;
      gap: 22px;
    }
    .meter-light {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 12px var(--green);
      animation: meterBlink 0.9s ease-in-out infinite;
      margin-bottom: -2px;
    }
    @keyframes meterBlink {
      0%, 100% { opacity: 1; box-shadow: 0 0 14px var(--green); }
      50%       { opacity: 0.3; box-shadow: 0 0 4px var(--green); }
    }
    .meter-head {
      width: 62px; height: 80px;
      background: var(--navy2);
      border-radius: 10px 10px 6px 6px;
      border: 2px solid #2d3f55;
      position: relative;
      overflow: hidden;
    }
    .meter-screen {
      position: absolute;
      top: 10px; left: 9px; right: 9px; bottom: 14px;
      background: #050b18;
      border-radius: 5px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .meter-fill-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, var(--green) 0%, #00e5ff 100%);
      animation: meterFillUp 2.2s ease-in-out infinite;
    }
    @keyframes meterFillUp {
      0%   { height: 0%;   }
      60%  { height: 100%; }
      85%  { height: 100%; }
      100% { height: 0%;   }
    }
    .meter-p {
      position: relative;
      z-index: 2;
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 800;
      color: white;
      mix-blend-mode: difference;
      user-select: none;
    }
    .meter-coin-slot {
      position: absolute;
      bottom: 5px; left: 50%;
      transform: translateX(-50%);
      width: 20px; height: 3px;
      background: #334155;
      border-radius: 2px;
    }
    .meter-neck { width: 12px; height: 8px; background: #334155; margin: 0 auto; }
    .meter-pole {
      width: 8px; height: 52px;
      background: linear-gradient(to right, #475569, #2d3f55, #475569);
      border-radius: 0 0 4px 4px;
      margin: 0 auto;
    }
    .loading-msg {
      font-family: 'Syne', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--muted);
      animation: msgIn 0.35s ease both;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Result cards ──────────────────────────────────────────────────── */
    .parking-card {
      background: white;
      border-radius: 16px;
      padding: 20px 22px;
      border-left: 5px solid var(--status-color, var(--green));
      box-shadow: 0 2px 10px rgba(0,0,0,.06);
      display: flex;
      gap: 18px;
      align-items: flex-start;
      animation: cardIn 0.5s cubic-bezier(.22,.68,0,1.15) both;
      animation-delay: var(--delay, 0s);
      transition: transform 0.22s, box-shadow 0.22s;
    }
    .parking-card:hover { transform: translateY(-4px); box-shadow: 0 14px 36px rgba(0,0,0,.1); }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .spot-number {
      font-family: 'Syne', sans-serif;
      font-size: 2.4rem;
      font-weight: 800;
      color: var(--status-color, var(--green));
      opacity: 0.22;
      min-width: 54px;
      line-height: 1;
      padding-top: 2px;
      text-align: center;
      flex-shrink: 0;
    }
    .card-body { flex: 1; min-width: 0; }
    .card-header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .card-address {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.35;
    }
    .card-side { font-family: 'Inter', sans-serif; font-weight: 400; color: var(--muted); font-size: 0.87rem; }
    .card-landmark { font-size: 0.82rem; color: var(--muted); margin-top: 3px; font-style: italic; }
    .status-badge {
      font-size: 0.68rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      white-space: nowrap;
      letter-spacing: 0.6px;
      font-family: 'Inter', sans-serif;
      flex-shrink: 0;
    }
    .card-streetview {
      width: 100%; height: 220px;
      object-fit: cover;
      border-radius: 10px;
      margin: 12px 0;
      display: block;
      background: var(--bg);
      border: 1px solid var(--border);
    }
    .card-details { display: flex; flex-wrap: wrap; gap: 7px; }
    .detail-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.78rem;
      color: var(--muted);
      background: var(--bg);
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      white-space: nowrap;
    }

    /* ── Message states ────────────────────────────────────────────────── */
    .msg { text-align: center; padding: 52px 16px; color: var(--muted); }
    .msg.error { color: #b91c1c; }
    .msg-icon  { font-size: 2.8rem; margin-bottom: 12px; }
    .msg p     { font-size: 0.95rem; }

    /* ── Footer ────────────────────────────────────────────────────────── */
    footer {
      background: var(--navy);
      color: #475569;
      text-align: center;
      padding: 22px 16px;
      font-size: 0.82rem;
      letter-spacing: 0.2px;
    }
    footer strong { color: #94A3B8; }

    /* ── Mobile ────────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .hero         { padding: 52px 16px 82px; }
      .logo-text    { font-size: 2.6rem; }
      .hero-tagline { font-size: 0.97rem; }
      .search-row   { flex-direction: column; }
      .search-btn   { width: 100%; padding: 14px; }
      .stats-inner  { gap: 6px 14px; padding: 12px 16px; }
      .stats-div    { display: none; }
      .parking-card { gap: 12px; padding: 16px; }
      .spot-number  { font-size: 1.9rem; min-width: 44px; }
    }
  </style>
</head>
<body>

  <div class="bg-dots" aria-hidden="true"></div>

  <!-- Hero -->
  <header class="hero">
    <div class="hero-logo">
      <div class="logo-icon">
        <svg width="68" height="68" viewBox="0 0 68 68" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle class="ring1" cx="34" cy="34" r="30" fill="rgba(0,200,83,0.13)"/>
          <circle class="ring2" cx="34" cy="34" r="22" fill="rgba(0,200,83,0.1)"/>
          <circle cx="34" cy="34" r="28" stroke="#00C853" stroke-width="2.5" fill="none" stroke-dasharray="6 3"/>
          <text x="34" y="46" text-anchor="middle" font-size="28" font-weight="800"
                fill="#00C853" font-family="Syne, sans-serif">P</text>
        </svg>
      </div>
      <span class="logo-text">ParkMe</span>
    </div>
    <p class="hero-tagline">Find free street parking anywhere, instantly</p>
  </header>

  <!-- Search panel -->
  <section class="search-section">
    <div class="search-card">
      <div class="search-row">
        <div class="input-group">
          <label for="city-input">City</label>
          <input id="city-input" class="input-field" type="text"
                 placeholder="Jersey City, NJ" autocomplete="off" />
        </div>
        <div class="input-group">
          <label for="street-input">Street or Address</label>
          <input id="street-input" class="input-field" type="text"
                 placeholder="175 2nd St  or  near Mango Mango" autocomplete="off" />
        </div>
        <button id="search-btn" class="search-btn">Search →</button>
      </div>
      <button id="location-btn" class="location-btn">📍 Use My Location</button>
      <div class="chips">
        <span class="chips-label">Quick select</span>
        <button class="chip" data-city="Jersey City, NJ">Jersey City, NJ</button>
        <button class="chip" data-city="New York, NY">New York, NY</button>
        <button class="chip" data-city="Chicago, IL">Chicago, IL</button>
        <button class="chip" data-city="Boston, MA">Boston, MA</button>
        <button class="chip" data-city="Austin, TX">Austin, TX</button>
      </div>
    </div>
  </section>

  <!-- Stats bar -->
  <div class="stats-bar" id="stats-bar" hidden>
    <div class="stats-inner">
      <span class="stat-item">
        <span class="stat-dot"></span>
        <strong id="stat-count">0</strong>&nbsp;Free Spots Found
      </span>
      <span class="stats-div">|</span>
      <span class="stat-item">📍 Near <strong id="stat-street">–</strong></span>
      <span class="stats-div">|</span>
      <span class="stat-item">🏙️ <strong id="stat-city">–</strong></span>
      <span class="stats-div">|</span>
      <span class="stat-item">🕐 <strong id="stat-time">–</strong></span>
    </div>
  </div>

  <!-- Results -->
  <div id="results"></div>

  <!-- Footer -->
  <footer>
    <strong>ParkMe</strong> © 2026 &nbsp;|&nbsp; Always verify posted signs before parking
  </footer>

  <script src="app.js"></script>
</body>
</html>
