<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Park Me – Find Free Street Parking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:  #00C853;
      --amber:  #FFB300;
      --red:    #F44336;
      --navy:   #0F172A;
      --navy2:  #1E293B;
      --slate:  #334155;
      --text:   #0F172A;
      --muted:  #64748B;
      --border: #E2E8F0;
      --white:  #FFFFFF;
      --bg:     #F8FAFC;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Animated dot grid ─────────────────────────────────────────────── */
    .bg-dots {
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #94a3b8 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.1;
      animation: scrollDots 28s linear infinite;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes scrollDots {
      from { background-position: 0 0; }
      to   { background-position: 28px 28px; }
    }

    /* ── Hero ──────────────────────────────────────────────────────────── */
    .hero {
      position: relative;
      background: linear-gradient(155deg, #060b17 0%, #0F172A 35%, #0d1f38 65%, #060c1a 100%);
      padding: 72px 16px 104px;
      text-align: center;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -80px; left: 50%;
      transform: translateX(-50%);
      width: 720px; height: 720px;
      background: radial-gradient(circle, rgba(0,200,83,.18) 0%, rgba(0,229,255,.06) 35%, transparent 65%);
      pointer-events: none;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,200,83,.25), transparent);
    }

    .hero-logo {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }
    .logo-icon {
      width: 68px; height: 68px;
      position: relative;
      flex-shrink: 0;
    }
    .logo-icon svg { position: absolute; top: 0; left: 0; }

    @keyframes pulseRing {
      0%, 100% { transform: scale(0.92); opacity: 0.55; }
      50%       { transform: scale(1.08); opacity: 0.18; }
    }
    .ring1 { animation: pulseRing 2.6s ease-in-out infinite;      transform-origin: 34px 34px; }
    .ring2 { animation: pulseRing 2.6s ease-in-out infinite 0.9s; transform-origin: 34px 34px; }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 3.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #00C853 0%, #00e5ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -2px;
    }
    .hero-tagline {
      font-size: 1.1rem;
      color: #64748B;
      font-weight: 400;
      margin-top: 8px;
      letter-spacing: 0.4px;
    }

    /* ── Search card ───────────────────────────────────────────────────── */
    .search-section {
      position: relative;
      z-index: 10;
      max-width: 760px;
      margin: -52px auto 0;
      padding: 0 16px;
    }
    .search-card {
      background: rgba(255,255,255,0.98);
      border-radius: 24px;
      padding: 30px 30px 24px;
      box-shadow:
        0 32px 80px rgba(0,0,0,.18),
        0 8px 24px rgba(0,0,0,.08),
        0 0 0 1px rgba(0,0,0,.05),
        inset 0 1px 0 rgba(255,255,255,0.9);
      backdrop-filter: blur(12px);
    }
    .search-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    .input-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .input-group label {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .input-field {
      width: 100%;
      padding: 14px 17px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background: #F8FAFC;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .input-field::placeholder { color: #CBD5E1; }
    .input-field:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 4px rgba(0,200,83,.11), 0 2px 8px rgba(0,200,83,.08);
      background: white;
    }
    .search-btn {
      padding: 14px 30px;
      background: linear-gradient(135deg, #00C853 0%, #00897B 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: 0.3px;
      box-shadow: 0 4px 16px rgba(0,200,83,.3);
      transition: transform 0.18s, box-shadow 0.18s, opacity 0.18s;
    }
    .search-btn:hover  { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(0,200,83,.42); }
    .search-btn:active { transform: translateY(0); box-shadow: 0 4px 12px rgba(0,200,83,.25); }
    .search-btn:disabled { opacity: 0.5; cursor: default; transform: none; box-shadow: none; }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 18px;
    }
    .chips-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      width: 100%;
      margin-bottom: 2px;
    }
    .chip {
      padding: 6px 15px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      background: white;
      font-size: 0.78rem;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s, transform 0.15s, box-shadow 0.15s;
    }
    .chip:hover {
      border-color: var(--green);
      color: #009e3f;
      background: rgba(0,200,83,.06);
      transform: translateY(-1px);
      box-shadow: 0 4px 10px rgba(0,200,83,.12);
    }
    .location-btn {
      width: 100%;
      margin-top: 14px;
      padding: 11px 16px;
      background: rgba(0,200,83,.04);
      border: 1.5px dashed rgba(0,200,83,.5);
      border-radius: 11px;
      color: #009e3f;
      font-family: 'Inter', sans-serif;
      font-size: 0.87rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: background 0.18s, border-color 0.18s, opacity 0.18s;
    }
    .location-btn:hover    { background: rgba(0,200,83,.09); border-color: var(--green); }
    .location-btn:disabled { opacity: 0.45; cursor: default; }

    /* ── Stats bar ─────────────────────────────────────────────────────── */
    .stats-bar {
      max-width: 760px;
      margin: 20px auto 0;
      padding: 0 16px;
      animation: fadeUp 0.45s cubic-bezier(.22,.68,0,1.15) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .stats-inner {
      background: linear-gradient(135deg, #0d1629 0%, #0F172A 100%);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 16px;
      padding: 14px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px 22px;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(0,0,0,.2);
    }
    .stat-item {
      font-size: 0.82rem;
      color: #64748B;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .stat-item strong { color: #CBD5E1; font-weight: 600; }
    .stat-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
      animation: dotBlink 1.8s ease-in-out infinite;
    }
    @keyframes dotBlink {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--green); }
      50%       { opacity: 0.3; box-shadow: none; }
    }
    .stats-div { color: rgba(255,255,255,.08); font-size: 1.2rem; }

    /* ── Results ───────────────────────────────────────────────────────── */
    #results {
      max-width: 760px;
      margin: 24px auto 72px;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Parking meter loader ──────────────────────────────────────────── */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 52px 16px;
      gap: 22px;
    }
    .meter-light {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 12px var(--green);
      animation: meterBlink 0.9s ease-in-out infinite;
      margin-bottom: -2px;
    }
    @keyframes meterBlink {
      0%, 100% { opacity: 1; box-shadow: 0 0 14px var(--green); }
      50%       { opacity: 0.3; box-shadow: 0 0 4px var(--green); }
    }
    .meter-head {
      width: 62px; height: 80px;
      background: var(--navy2);
      border-radius: 10px 10px 6px 6px;
      border: 2px solid #2d3f55;
      position: relative;
      overflow: hidden;
    }
    .meter-screen {
      position: absolute;
      top: 10px; left: 9px; right: 9px; bottom: 14px;
      background: #050b18;
      border-radius: 5px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .meter-fill-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, var(--green) 0%, #00e5ff 100%);
      animation: meterFillUp 2.2s ease-in-out infinite;
    }
    @keyframes meterFillUp {
      0%   { height: 0%;   }
      60%  { height: 100%; }
      85%  { height: 100%; }
      100% { height: 0%;   }
    }
    .meter-p {
      position: relative;
      z-index: 2;
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 800;
      color: white;
      mix-blend-mode: difference;
      user-select: none;
    }
    .meter-coin-slot {
      position: absolute;
      bottom: 5px; left: 50%;
      transform: translateX(-50%);
      width: 20px; height: 3px;
      background: #334155;
      border-radius: 2px;
    }
    .meter-neck { width: 12px; height: 8px; background: #334155; margin: 0 auto; }
    .meter-pole {
      width: 8px; height: 52px;
      background: linear-gradient(to right, #475569, #2d3f55, #475569);
      border-radius: 0 0 4px 4px;
      margin: 0 auto;
    }
    .loading-msg {
      font-family: 'Syne', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--muted);
      animation: msgIn 0.35s ease both;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Result cards ──────────────────────────────────────────────────── */
    .parking-card {
      background: white;
      border-radius: 18px;
      padding: 22px 24px;
      border-left: 4px solid var(--status-color, var(--green));
      box-shadow:
        0 2px 12px rgba(0,0,0,.06),
        0 1px 3px rgba(0,0,0,.04);
      display: flex;
      gap: 20px;
      align-items: flex-start;
      animation: cardIn 0.52s cubic-bezier(.22,.68,0,1.2) both;
      animation-delay: var(--delay, 0s);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .parking-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 44px rgba(0,0,0,.1), 0 2px 8px rgba(0,0,0,.06);
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .spot-number {
      font-family: 'Syne', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--status-color, var(--green));
      opacity: 0.18;
      min-width: 52px;
      line-height: 1;
      padding-top: 3px;
      text-align: center;
      flex-shrink: 0;
    }
    .card-body { flex: 1; min-width: 0; }
    .card-header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .card-address {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.35;
      color: #0F172A;
    }
    .card-side { font-family: 'Inter', sans-serif; font-weight: 400; color: var(--muted); font-size: 0.85rem; }
    .card-landmark { font-size: 0.81rem; color: #94A3B8; margin-top: 3px; font-style: italic; }
    .status-badge {
      font-size: 0.67rem;
      font-weight: 700;
      padding: 4px 11px;
      border-radius: 20px;
      white-space: nowrap;
      letter-spacing: 0.7px;
      font-family: 'Inter', sans-serif;
      flex-shrink: 0;
    }
    .card-streetview {
      width: 100%; height: 200px;
      object-fit: cover;
      border-radius: 12px;
      margin: 14px 0;
      display: block;
      background: var(--bg);
      border: 1px solid var(--border);
    }
    .card-details { display: flex; flex-wrap: wrap; gap: 6px; }
    .detail-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.76rem;
      color: #64748B;
      background: #F8FAFC;
      padding: 4px 11px;
      border-radius: 20px;
      border: 1px solid #EEF2F7;
      white-space: nowrap;
    }

    /* ── Crowdsourced report section ──────────────────────────────────── */
    .card-report      { margin-top: 16px; border-top: 1px solid #F1F5F9; padding-top: 14px; }
    .report-status    { min-height: 22px; margin-bottom: 9px; }
    .report-status-badge {
      display: inline-flex;
      align-items: center;
      font-size: 0.76rem;
      font-weight: 600;
      padding: 3px 11px;
      border-radius: 20px;
      border: 1.5px solid;
    }
    .report-actions   { display: flex; gap: 8px; }
    .report-btn {
      flex: 1;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1.5px solid;
      font-size: 0.81rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      background: transparent;
      transition: background 0.15s, transform 0.15s, box-shadow 0.15s;
    }
    .report-btn:hover    { transform: translateY(-1px); }
    .report-btn:disabled { opacity: 0.35; cursor: default; transform: none; }
    .report-free         { border-color: rgba(0,200,83,.45); color: #00954a; }
    .report-free:hover   { background: rgba(0,200,83,.08); border-color: #00C853; box-shadow: 0 3px 10px rgba(0,200,83,.15); }
    .report-taken        { border-color: rgba(244,67,54,.4); color: #c62828; }
    .report-taken:hover  { background: rgba(244,67,54,.07); border-color: #F44336; box-shadow: 0 3px 10px rgba(244,67,54,.12); }

    /* ── Message states ────────────────────────────────────────────────── */
    .msg { text-align: center; padding: 52px 16px; color: var(--muted); }
    .msg.error { color: #b91c1c; }
    .msg-icon  { font-size: 2.8rem; margin-bottom: 12px; }
    .msg p     { font-size: 0.95rem; }

    /* ── Footer ────────────────────────────────────────────────────────── */
    footer {
      background: #080e1c;
      color: #334155;
      text-align: center;
      padding: 24px 16px;
      font-size: 0.8rem;
      letter-spacing: 0.3px;
      border-top: 1px solid rgba(255,255,255,.04);
    }
    footer strong { color: #64748B; font-weight: 600; }

    /* ── Mobile ────────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .hero         { padding: 56px 16px 86px; }
      .logo-text    { font-size: 2.7rem; letter-spacing: -1.5px; }
      .hero-tagline { font-size: 0.95rem; }
      .search-card  { padding: 22px 18px 18px; border-radius: 20px; }
      .search-row   { flex-direction: column; }
      .search-btn   { width: 100%; padding: 14px; }
      .stats-inner  { gap: 6px 14px; padding: 12px 16px; }
      .stats-div    { display: none; }
      .parking-card { gap: 12px; padding: 16px 18px; border-radius: 16px; }
      .spot-number  { font-size: 1.8rem; min-width: 42px; }
    }
  </style>
</head>
<body>

  <div class="bg-dots" aria-hidden="true"></div>

  <!-- Hero -->
  <header class="hero">
    <div class="hero-logo">
      <div class="logo-icon">
        <svg width="68" height="68" viewBox="0 0 68 68" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle class="ring1" cx="34" cy="34" r="30" fill="rgba(0,200,83,0.13)"/>
          <circle class="ring2" cx="34" cy="34" r="22" fill="rgba(0,200,83,0.1)"/>
          <circle cx="34" cy="34" r="28" stroke="#00C853" stroke-width="2.5" fill="none" stroke-dasharray="6 3"/>
          <text x="34" y="46" text-anchor="middle" font-size="28" font-weight="800"
                fill="#00C853" font-family="Syne, sans-serif">P</text>
        </svg>
      </div>
      <span class="logo-text">Park Me</span>
    </div>
    <p class="hero-tagline">Find free street parking anywhere, instantly</p>
  </header>

  <!-- Search panel -->
  <section class="search-section">
    <div class="search-card">
      <div class="search-row">
        <div class="input-group">
          <label for="city-input">City</label>
          <input id="city-input" class="input-field" type="text"
                 placeholder="Jersey City, NJ" autocomplete="off" />
        </div>
        <div class="input-group">
          <label for="street-input">Street or Address</label>
          <input id="street-input" class="input-field" type="text"
                 placeholder="175 2nd St  or  near Mango Mango" autocomplete="off" />
        </div>
        <button id="search-btn" class="search-btn">Search →</button>
      </div>
      <button id="location-btn" class="location-btn">📍 Use My Location</button>
      <div class="chips">
        <span class="chips-label">Quick select</span>
        <button class="chip" data-city="Jersey City, NJ">Jersey City, NJ</button>
        <button class="chip" data-city="New York, NY">New York, NY</button>
        <button class="chip" data-city="Chicago, IL">Chicago, IL</button>
        <button class="chip" data-city="Boston, MA">Boston, MA</button>
        <button class="chip" data-city="Austin, TX">Austin, TX</button>
      </div>
    </div>
  </section>

  <!-- Stats bar -->
  <div class="stats-bar" id="stats-bar" hidden>
    <div class="stats-inner">
      <span class="stat-item">
        <span class="stat-dot"></span>
        <strong id="stat-count">0</strong>&nbsp;Free Spots Found
      </span>
      <span class="stats-div">|</span>
      <span class="stat-item">📍 Near <strong id="stat-street">–</strong></span>
      <span class="stats-div">|</span>
      <span class="stat-item">🏙️ <strong id="stat-city">–</strong></span>
      <span class="stats-div">|</span>
      <span class="stat-item">🕐 <strong id="stat-time">–</strong></span>
    </div>
  </div>

  <!-- Results -->
  <div id="results"></div>

  <!-- Footer -->
  <footer>
    <strong>Park Me</strong> © 2026 &nbsp;|&nbsp; Always verify posted signs before parking
  </footer>

  <script src="app.js"></script>
</body>
</html>
