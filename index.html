<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ParkMe – Find Free Street Parking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:  #34C759;
      --amber:  #FF9F0A;
      --red:    #FF3B30;
      --blue:   #0A84FF;
      --purple: #BF5AF2;
      --text:   #1c1c1e;
      --t80:    rgba(28,28,30,.8);
      --t55:    rgba(28,28,30,.55);
      --t30:    rgba(28,28,30,.30);
      --t12:    rgba(28,28,30,.12);
      --t06:    rgba(28,28,30,.06);
      --w100:   rgba(255,255,255,1);
      --w80:    rgba(255,255,255,.80);
      --w60:    rgba(255,255,255,.60);
      --w30:    rgba(255,255,255,.30);
      --glass:  rgba(255,255,255,.58);
      --glassH: rgba(255,255,255,.78);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Nunito', -apple-system, sans-serif;
      background: #dde8f5;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── iOS mesh gradient background ─────────────────────────────────── */
    .bg-scene {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse at 15% 15%, rgba(167,232,255,.85) 0%, transparent 45%),
        radial-gradient(ellipse at 85% 10%, rgba(255,200,230,.80) 0%, transparent 45%),
        radial-gradient(ellipse at 50% 60%, rgba(195,210,255,.75) 0%, transparent 50%),
        radial-gradient(ellipse at 10% 80%, rgba(180,255,200,.70) 0%, transparent 45%),
        radial-gradient(ellipse at 88% 80%, rgba(255,220,160,.70) 0%, transparent 45%);
      background-color: #e8f0fb;
    }
    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: .55;
      animation: orbDrift 20s ease-in-out infinite alternate;
    }
    .bg-orb-1 { width: 55vw; height: 55vw; top: -10%; left: -8%;  background: rgba(120,200,255,.6); animation-duration: 22s; }
    .bg-orb-2 { width: 50vw; height: 50vw; top: -5%;  right: -8%; background: rgba(255,160,200,.5); animation-duration: 18s; animation-delay: -6s; }
    .bg-orb-3 { width: 45vw; height: 45vw; bottom: 5%; left: 20%; background: rgba(160,200,255,.5); animation-duration: 25s; animation-delay: -10s; }
    @keyframes orbDrift {
      from { transform: translate(0,0) scale(1);   }
      to   { transform: translate(5vw,6vh) scale(1.12); }
    }

    /* ── Hero ──────────────────────────────────────────────────────────── */
    .hero {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 88px 24px 72px;
    }

    /* ── Logo pill ─────────────────────────────────────────────────────── */
    .logo-pill {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      padding: 14px 22px 14px 14px;
      background: rgba(255,255,255,.62);
      backdrop-filter: blur(60px) saturate(180%);
      -webkit-backdrop-filter: blur(60px) saturate(180%);
      border: 1px solid rgba(255,255,255,.90);
      border-radius: 100px;
      box-shadow:
        0 20px 56px rgba(0,0,0,.10),
        0 4px 16px rgba(0,0,0,.06),
        inset 0 1.5px 0 rgba(255,255,255,1),
        inset 0 -1px 0 rgba(0,0,0,.04);
      margin-bottom: 40px;
    }

    /* P icon circle */
    .logo-icon {
      width: 54px; height: 54px;
      border-radius: 50%;
      background: linear-gradient(145deg, rgba(255,255,255,.95), rgba(255,255,255,.70));
      border: 1px solid rgba(255,255,255,.95);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; font-weight: 900; color: var(--green);
      box-shadow:
        0 4px 14px rgba(52,199,89,.18),
        0 2px 6px rgba(0,0,0,.08),
        inset 0 1px 0 rgba(255,255,255,1);
      flex-shrink: 0;
      letter-spacing: -1px;
    }

    /* Text col: "ParkMe" + sub */
    .logo-text-col {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 3px;
    }

    /* "ParkMe" + fun bubbles on same row */
    .logo-name-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-name {
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: -1.2px;
      line-height: 1;
      color: var(--t80);
    }
    .logo-name em { font-style: normal; color: var(--green); }

    /* fun letter bubbles */
    .fun-row {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: -2px;
    }

    .fb {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px; height: 28px;
      border-radius: 50%;
      font-size: .88rem;
      font-weight: 900;
      border: 1.5px solid;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 2px 8px rgba(0,0,0,.10), inset 0 1px 0 rgba(255,255,255,.8);
    }
    .fb-f {
      background: rgba(255,159,10,.18);
      border-color: rgba(255,159,10,.45);
      color: #c97800;
      transform: rotate(-10deg) translateY(-2px);
      animation: fbFloat 2.8s ease-in-out infinite 0s;
    }
    .fb-u {
      background: rgba(52,199,89,.18);
      border-color: rgba(52,199,89,.45);
      color: #1a8c3f;
      transform: rotate(6deg) translateY(2px);
      animation: fbFloat 2.8s ease-in-out infinite .2s;
    }
    .fb-n {
      background: rgba(10,132,255,.16);
      border-color: rgba(10,132,255,.40);
      color: #0060c7;
      transform: rotate(-6deg) translateY(-1px);
      animation: fbFloat 2.8s ease-in-out infinite .4s;
    }
    @keyframes fbFloat {
      0%,100% { transform: rotate(var(--r,0deg)) translateY(0); }
      50%      { transform: rotate(var(--r,0deg)) translateY(-4px); }
    }
    .fb-f { --r: -10deg; }
    .fb-u { --r:   6deg; }
    .fb-n { --r:  -6deg; }

    .logo-sub {
      font-size: .60rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--t30);
      padding-left: 1px;
    }

    /* ── Hero headline ─────────────────────────────────────────────────── */
    .hero-headline {
      font-size: clamp(2.8rem, 6.5vw, 5rem);
      font-weight: 900;
      letter-spacing: -2.5px;
      line-height: 1.04;
      color: var(--text);
      margin-bottom: 16px;
    }

    .hero-sub {
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--t55);
      max-width: 400px;
      margin: 0 auto;
      line-height: 1.65;
    }

    /* ── Glass mixin (reused) ──────────────────────────────────────────── */
    .glass-panel {
      background: var(--glass);
      backdrop-filter: blur(48px) saturate(180%);
      -webkit-backdrop-filter: blur(48px) saturate(180%);
      border: 1px solid rgba(255,255,255,.88);
      box-shadow:
        0 20px 56px rgba(0,0,0,.10),
        0 4px 14px rgba(0,0,0,.06),
        inset 0 1.5px 0 rgba(255,255,255,1);
    }

    /* ── Search card ───────────────────────────────────────────────────── */
    .search-section {
      position: relative;
      z-index: 10;
      max-width: 760px;
      margin: 0 auto;
      padding: 0 20px 52px;
    }

    .search-card {
      border-radius: 28px;
      padding: 26px 26px 22px;
    }

    .search-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .input-group label {
      font-size: .62rem;
      font-weight: 800;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: var(--t30);
      padding-left: 4px;
    }

    .input-field {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,.72);
      border: 1px solid rgba(255,255,255,.90);
      border-radius: 16px;
      font-size: .93rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      color: var(--text);
      outline: none;
      box-shadow: inset 0 1px 3px rgba(0,0,0,.05);
      transition: all .2s;
    }
    .input-field::placeholder { color: var(--t30); font-weight: 500; }
    .input-field:focus {
      background: rgba(255,255,255,.95);
      border-color: rgba(52,199,89,.55);
      box-shadow: 0 0 0 4px rgba(52,199,89,.13), inset 0 1px 3px rgba(0,0,0,.04);
    }

    .search-btn {
      padding: 13px 24px;
      background: linear-gradient(155deg, rgba(28,28,30,.88), rgba(28,28,30,.96));
      color: #fff;
      border: none;
      border-radius: 16px;
      font-family: 'Nunito', sans-serif;
      font-size: .92rem;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: .2px;
      box-shadow: 0 4px 16px rgba(0,0,0,.20), inset 0 1px 0 rgba(255,255,255,.14);
      transition: transform .18s, box-shadow .18s, opacity .18s;
    }
    .search-btn:hover   { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(0,0,0,.25); }
    .search-btn:active  { transform: translateY(0); }
    .search-btn:disabled { opacity: .35; cursor: default; transform: none; box-shadow: none; }

    .location-btn {
      width: 100%;
      margin-top: 10px;
      padding: 11px 16px;
      background: rgba(255,255,255,.46);
      border: 1px solid rgba(255,255,255,.80);
      border-radius: 14px;
      color: var(--t55);
      font-family: 'Nunito', sans-serif;
      font-size: .85rem;
      font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      gap: 7px;
      transition: background .18s, color .18s;
    }
    .location-btn:hover    { background: rgba(255,255,255,.80); color: var(--text); }
    .location-btn:disabled { opacity: .35; cursor: default; }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 16px;
    }
    .chips-label {
      font-size: .60rem; font-weight: 800;
      letter-spacing: 1.6px; text-transform: uppercase;
      color: var(--t30); width: 100%; padding-left: 4px;
    }
    .chip {
      padding: 6px 16px;
      border: 1px solid rgba(255,255,255,.80);
      border-radius: 100px;
      background: rgba(255,255,255,.50);
      font-size: .77rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      color: var(--t55);
      cursor: pointer;
      transition: all .18s;
    }
    .chip:hover {
      background: rgba(255,255,255,.85);
      border-color: rgba(52,199,89,.45);
      color: #1a7f35;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(52,199,89,.12);
    }

    /* ── Stats bar ─────────────────────────────────────────────────────── */
    .stats-bar {
      position: relative; z-index: 10;
      max-width: 760px; margin: 0 auto 18px; padding: 0 20px;
      animation: fadeUp .4s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .stats-inner {
      border-radius: 18px;
      padding: 12px 22px;
      display: flex; flex-wrap: wrap;
      gap: 4px 20px;
      align-items: center; justify-content: center;
    }
    .stat-item { font-size: .78rem; font-weight: 600; color: var(--t55); display: flex; align-items: center; gap: 6px; }
    .stat-item strong { color: var(--text); font-weight: 800; }
    .stat-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green); flex-shrink: 0;
      animation: dotBlink 2s ease-in-out infinite;
    }
    @keyframes dotBlink {
      0%,100% { opacity:1; box-shadow: 0 0 5px var(--green); }
      50%      { opacity:.3; box-shadow:none; }
    }
    .stats-div { color: var(--t12); }

    /* ── Results layout ────────────────────────────────────────────────── */
    .results-wrapper {
      position: relative; z-index: 10;
      max-width: 820px; margin: 0 auto 100px; padding: 0 20px;
      display: grid; grid-template-columns: 1fr; gap: 16px; align-items: start;
    }
    .results-wrapper.has-map { max-width: 1360px; grid-template-columns: 1fr 400px; }
    #results { display: flex; flex-direction: column; gap: 14px; min-width: 0; }

    /* ── Map panel ─────────────────────────────────────────────────────── */
    .map-panel {
      position: sticky; top: 24px;
      border-radius: 26px; overflow: hidden;
      border: 1px solid rgba(255,255,255,.90);
      box-shadow: 0 12px 44px rgba(0,0,0,.10);
    }
    .map-header {
      padding: 13px 18px;
      font-size: .77rem; font-weight: 700; color: var(--t55);
      background: rgba(255,255,255,.70);
      backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px);
      border-bottom: 1px solid rgba(0,0,0,.05);
      display: flex; align-items: center; gap: 7px;
    }
    .map-header span { color: var(--text); }
    #map { width: 100%; height: 540px; }
    .leaflet-popup-content-wrapper {
      background: rgba(255,255,255,.88) !important;
      backdrop-filter: blur(28px) !important;
      border: 1px solid rgba(255,255,255,.90) !important;
      border-radius: 18px !important;
      box-shadow: 0 12px 36px rgba(0,0,0,.14) !important;
      padding: 0 !important;
    }
    .leaflet-popup-content { margin: 0 !important; }
    .leaflet-popup-tip { background: rgba(255,255,255,.88) !important; }

    /* ── Loader ────────────────────────────────────────────────────────── */
    .loading-state {
      display: flex; flex-direction: column;
      align-items: center; padding: 72px 16px; gap: 20px;
    }
    .meter-light {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--green); box-shadow: 0 0 8px var(--green);
      animation: meterBlink 1s ease-in-out infinite; margin-bottom: -2px;
    }
    @keyframes meterBlink {
      0%,100% { opacity:1; box-shadow: 0 0 10px var(--green); }
      50%      { opacity:.2; box-shadow:none; }
    }
    .meter-head {
      width: 56px; height: 72px;
      background: var(--glass); backdrop-filter: blur(20px);
      border-radius: 12px 12px 6px 6px;
      border: 1px solid rgba(255,255,255,.90);
      position: relative; overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,.10);
    }
    .meter-screen {
      position: absolute; top:9px; left:8px; right:8px; bottom:13px;
      background: rgba(28,28,30,.07); border-radius: 6px;
      overflow: hidden; display: flex; align-items: center; justify-content: center;
    }
    .meter-fill-bar {
      position: absolute; bottom:0; left:0; right:0;
      background: linear-gradient(to top, var(--green), rgba(52,199,89,.35));
      animation: meterFillUp 2.2s ease-in-out infinite;
    }
    @keyframes meterFillUp {
      0%   { height:0%; }
      60%  { height:100%; }
      85%  { height:100%; }
      100% { height:0%; }
    }
    .meter-p {
      position: relative; z-index:2;
      font-family:'Nunito',sans-serif; font-size:22px; font-weight:900;
      color: var(--text); mix-blend-mode:multiply; user-select:none;
    }
    .meter-coin-slot {
      position:absolute; bottom:4px; left:50%; transform:translateX(-50%);
      width:18px; height:2px; background:rgba(0,0,0,.09); border-radius:2px;
    }
    .meter-neck { width:10px; height:7px; background:rgba(0,0,0,.07); margin:0 auto; }
    .meter-pole {
      width:6px; height:44px;
      background: linear-gradient(to right, rgba(0,0,0,.09), rgba(0,0,0,.05), rgba(0,0,0,.09));
      border-radius:0 0 4px 4px; margin:0 auto;
    }
    .loading-msg {
      font-size:.92rem; font-weight:600; color:var(--t55);
      animation: msgIn .3s ease both;
    }
    @keyframes msgIn {
      from { opacity:0; transform:translateY(5px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── Result cards ──────────────────────────────────────────────────── */
    .parking-card {
      background: var(--glass);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid rgba(255,255,255,.90);
      border-radius: 24px;
      padding: 20px 22px;
      position: relative; overflow: hidden;
      display: flex; gap: 16px; align-items: flex-start;
      animation: cardIn .5s cubic-bezier(.22,.68,0,1.2) both;
      animation-delay: var(--delay, 0s);
      transition: background .2s, box-shadow .2s, transform .2s;
      box-shadow: 0 4px 20px rgba(0,0,0,.07), inset 0 1.5px 0 rgba(255,255,255,1);
    }
    .parking-card::before {
      content:''; position:absolute;
      left:0; top:14px; bottom:14px;
      width:3.5px; border-radius:0 3px 3px 0;
      background: var(--status-color, var(--green)); opacity:.75;
    }
    .parking-card:hover {
      background: var(--glassH);
      box-shadow: 0 14px 40px rgba(0,0,0,.11), inset 0 1.5px 0 rgba(255,255,255,1);
      transform: translateY(-3px);
    }
    @keyframes cardIn {
      from { opacity:0; transform:translateY(14px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .spot-number {
      font-size: 2.1rem; font-weight:900;
      color: var(--status-color, var(--green));
      opacity:.12; min-width:48px; line-height:1;
      padding-top:2px; text-align:center;
      flex-shrink:0; letter-spacing:-2px;
    }
    .card-body { flex:1; min-width:0; }
    .card-header-row {
      display:flex; justify-content:space-between;
      align-items:flex-start; gap:10px; margin-bottom:8px; flex-wrap:wrap;
    }
    .card-address {
      font-size:.96rem; font-weight:800;
      line-height:1.4; color:var(--text); letter-spacing:-.2px;
    }
    .card-side { font-weight:500; color:var(--t55); font-size:.83rem; }
    .card-landmark { font-size:.77rem; color:var(--t30); margin-top:3px; font-style:italic; }
    .status-badge {
      font-size:.62rem; font-weight:800;
      padding:3px 11px; border-radius:100px;
      white-space:nowrap; letter-spacing:.5px; flex-shrink:0;
    }
    .card-streetview {
      width:100%; height:185px; object-fit:cover;
      border-radius:14px; margin:12px 0 4px; display:block;
      background:rgba(0,0,0,.04); border:1px solid rgba(0,0,0,.05);
    }
    .sv-disclaimer { font-size:.69rem; color:var(--t30); font-style:italic; margin:0 0 12px; }
    .card-details { display:flex; flex-wrap:wrap; gap:6px; }
    .detail-item {
      display:flex; align-items:center; gap:5px;
      font-size:.72rem; font-weight:600; color:var(--t55);
      background:rgba(255,255,255,.60); padding:4px 11px;
      border-radius:100px; border:1px solid rgba(255,255,255,.80);
      white-space:nowrap;
    }

    /* ── Report ────────────────────────────────────────────────────────── */
    .card-report   { margin-top:14px; border-top:1px solid rgba(0,0,0,.05); padding-top:13px; }
    .report-status { min-height:22px; margin-bottom:8px; }
    .report-status-badge {
      display:inline-flex; align-items:center;
      font-size:.73rem; font-weight:700;
      padding:3px 11px; border-radius:100px; border:1px solid;
    }
    .report-actions { display:flex; gap:8px; }
    .report-btn {
      flex:1; padding:8px 10px; border-radius:12px;
      border:1px solid rgba(255,255,255,.80);
      font-size:.79rem; font-weight:700;
      font-family:'Nunito',sans-serif; cursor:pointer;
      background:rgba(255,255,255,.50); color:var(--t55);
      transition: all .15s;
    }
    .report-btn:hover    { transform:translateY(-1px); }
    .report-btn:disabled { opacity:.3; cursor:default; transform:none; }
    .report-free:hover  { background:rgba(52,199,89,.14); border-color:rgba(52,199,89,.45); color:#1a7f35; }
    .report-taken:hover { background:rgba(255,59,48,.09); border-color:rgba(255,59,48,.38); color:#c0170f; }

    /* ── Messages ──────────────────────────────────────────────────────── */
    .msg { text-align:center; padding:64px 16px; color:var(--t55); }
    .msg.error { color:rgba(255,59,48,.8); }
    .msg-icon { font-size:2.5rem; margin-bottom:14px; }
    .msg p { font-size:.92rem; font-weight:600; }

    /* ── Footer ────────────────────────────────────────────────────────── */
    footer {
      position:relative; z-index:1;
      text-align:center; padding:28px 16px;
      font-size:.76rem; font-weight:600;
      color:var(--t30); letter-spacing:.2px;
      border-top:1px solid rgba(0,0,0,.05);
    }
    footer strong { color:var(--t55); }

    /* ── Mobile ────────────────────────────────────────────────────────── */
    @media (max-width:640px) {
      .hero              { padding:64px 20px 52px; }
      .logo-pill         { padding:11px 18px 11px 11px; gap:10px; margin-bottom:28px; }
      .logo-icon         { width:44px; height:44px; font-size:1.25rem; }
      .logo-name         { font-size:1.45rem; }
      .fb                { width:24px; height:24px; font-size:.76rem; }
      .hero-headline     { letter-spacing:-1.8px; }
      .search-card       { padding:18px 16px; border-radius:22px; }
      .search-row        { flex-direction:column; }
      .search-btn        { width:100%; padding:14px; }
      .stats-inner       { gap:5px 12px; padding:10px 14px; }
      .stats-div         { display:none; }
      .parking-card      { gap:10px; padding:16px; }
      .spot-number       { font-size:1.7rem; min-width:40px; }
      .results-wrapper.has-map { grid-template-columns:1fr; max-width:820px; }
      .map-panel         { position:static; }
      #map               { height:280px; }
    }
  </style>
</head>
<body>

  <!-- iOS mesh bg -->
  <div class="bg-scene" aria-hidden="true">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
  </div>

  <!-- Hero -->
  <header class="hero">

    <!-- Glass logo pill -->
    <div class="logo-pill">
      <div class="logo-icon">P</div>
      <div class="logo-text-col">
        <div class="logo-name-row">
          <span class="logo-name">Park<em>Me</em></span>
          <div class="fun-row">
            <span class="fb fb-f">f</span>
            <span class="fb fb-u">u</span>
            <span class="fb fb-n">n</span>
          </div>
        </div>
        <span class="logo-sub">Free Street Parking</span>
      </div>
    </div>

    <h1 class="hero-headline">Find parking,<br>instantly.</h1>
    <p class="hero-sub">Street-level free spots near you, in seconds.</p>

  </header>

  <!-- Search -->
  <section class="search-section">
    <div class="search-card glass-panel">
      <div class="search-row">
        <div class="input-group">
          <label for="city-input">City</label>
          <input id="city-input" class="input-field" type="text" placeholder="" autocomplete="off" />
        </div>
        <div class="input-group">
          <label for="street-input">Street or Address</label>
          <input id="street-input" class="input-field" type="text" placeholder="" autocomplete="off" />
        </div>
        <button id="search-btn" class="search-btn">Search →</button>
      </div>
      <button id="location-btn" class="location-btn">📍 Use My Current Location</button>
      <div class="chips">
        <span class="chips-label">Popular cities</span>
        <button class="chip" data-city="Jersey City, NJ">Jersey City, NJ</button>
        <button class="chip" data-city="New York, NY">New York, NY</button>
        <button class="chip" data-city="Chicago, IL">Chicago, IL</button>
        <button class="chip" data-city="Boston, MA">Boston, MA</button>
        <button class="chip" data-city="Austin, TX">Austin, TX</button>
      </div>
    </div>
  </section>

  <!-- Stats -->
  <div class="stats-bar" id="stats-bar" hidden>
    <div class="stats-inner glass-panel">
      <span class="stat-item">
        <span class="stat-dot"></span>
        <strong id="stat-count">0</strong>&nbsp;free spots found
      </span>
      <span class="stats-div">·</span>
      <span class="stat-item">📍 Near <strong id="stat-street">–</strong></span>
      <span class="stats-div">·</span>
      <span class="stat-item">🏙️ <strong id="stat-city">–</strong></span>
      <span class="stats-div">·</span>
      <span class="stat-item">🕐 <strong id="stat-time">–</strong></span>
    </div>
  </div>

  <!-- Results + Map -->
  <div class="results-wrapper" id="results-wrapper">
    <div id="results"></div>
    <aside class="map-panel" id="map-panel" hidden>
      <div class="map-header">
        🗺 <span id="map-spot-count">0 spots</span> on map &nbsp;·&nbsp; click a pin for details
      </div>
      <div id="map"></div>
    </aside>
  </div>

  <!-- Footer -->
  <footer>
    <strong>ParkMe</strong> &ensp;·&ensp; © 2026 &ensp;·&ensp; Always verify posted signs before parking
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
