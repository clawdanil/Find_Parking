<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ParkMe – Find Free Street Parking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Caveat:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:    #34C759;
      --amber:    #FF9F0A;
      --red:      #FF3B30;
      --blue:     #0A84FF;
      --text:     #1d1d1f;
      --text60:   rgba(29,29,31,0.6);
      --text35:   rgba(29,29,31,0.35);
      --text15:   rgba(29,29,31,0.15);
      --border:   rgba(0,0,0,0.08);
      --glass:    rgba(255,255,255,0.62);
      --glass-h:  rgba(255,255,255,0.82);
      --glass-s:  rgba(255,255,255,0.45);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #e8edf2;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Ambient background ────────────────────────────────────────────── */
    .bg-scene {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: linear-gradient(145deg, #dff0ff 0%, #e8f5e9 35%, #fce4ec 65%, #e8eaf6 100%);
    }
    .bg-scene::before {
      content: '';
      position: absolute;
      top: -15%; left: -5%;
      width: 65vw; height: 65vw;
      background: radial-gradient(circle, rgba(52,199,89,.22) 0%, transparent 60%);
      animation: driftA 20s ease-in-out infinite alternate;
    }
    .bg-scene::after {
      content: '';
      position: absolute;
      bottom: -10%; right: -5%;
      width: 55vw; height: 55vw;
      background: radial-gradient(circle, rgba(10,132,255,.16) 0%, transparent 60%);
      animation: driftB 25s ease-in-out infinite alternate;
    }
    @keyframes driftA {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(4vw,6vh) scale(1.12); }
    }
    @keyframes driftB {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(-4vw,-5vh) scale(1.1); }
    }

    /* ── Hero ──────────────────────────────────────────────────────────── */
    .hero {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 96px 24px 72px;
    }

    .logo-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 50px; height: 50px;
      border-radius: 14px;
      background: var(--glass);
      border: 1px solid rgba(255,255,255,0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      margin-bottom: 24px;
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--green);
      box-shadow: 0 4px 16px rgba(0,0,0,.08), inset 0 1px 0 rgba(255,255,255,1);
    }

    .hero-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 14px;
      opacity: 0.85;
    }

    /* Title + fun word wrapper */
    .title-block {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      margin-bottom: 20px;
    }

    .hero-title {
      font-size: clamp(3rem, 8vw, 5.5rem);
      font-weight: 800;
      letter-spacing: -3px;
      line-height: 1;
      color: var(--text);
    }
    .hero-title span { color: var(--green); }

    /* ── "fun" word ──────────────────────────────────────────────────── */
    .fun-word {
      position: relative;
      display: inline-block;
      margin-top: 6px;
      transform: rotate(-7deg) translateX(12px);
      transform-origin: left center;
      animation: funFloat 3.5s ease-in-out infinite;
    }

    @keyframes funFloat {
      0%, 100% { transform: rotate(-7deg) translateX(12px) translateY(0); }
      40%       { transform: rotate(-9deg) translateX(12px) translateY(-4px); }
      70%       { transform: rotate(-5deg) translateX(12px) translateY(2px); }
    }

    .fun-word .fun-text {
      font-family: 'Caveat', cursive;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 700;
      line-height: 1;
      display: inline-flex;
      gap: 1px;
    }

    .fun-word .fun-text .f { color: #FF9F0A; animation: letterBounce 1.6s ease-in-out infinite 0s; }
    .fun-word .fun-text .u { color: #34C759; animation: letterBounce 1.6s ease-in-out infinite 0.15s; }
    .fun-word .fun-text .n { color: #0A84FF; animation: letterBounce 1.6s ease-in-out infinite 0.3s; }

    @keyframes letterBounce {
      0%, 100% { transform: translateY(0); }
      40%       { transform: translateY(-5px); }
      60%       { transform: translateY(-2px); }
    }

    /* Squiggly underline */
    .fun-squiggle {
      position: absolute;
      bottom: -6px;
      left: -4px;
      right: -4px;
      height: 10px;
      overflow: visible;
    }
    .fun-squiggle path {
      fill: none;
      stroke: url(#squiggleGrad);
      stroke-width: 2.5;
      stroke-linecap: round;
    }

    .hero-sub {
      font-size: clamp(1rem, 2vw, 1.15rem);
      font-weight: 400;
      color: var(--text60);
      letter-spacing: -0.1px;
      max-width: 440px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ── Search card ───────────────────────────────────────────────────── */
    .search-section {
      position: relative;
      z-index: 10;
      max-width: 760px;
      margin: 0 auto;
      padding: 0 20px 56px;
    }

    .search-card {
      background: var(--glass);
      backdrop-filter: blur(48px);
      -webkit-backdrop-filter: blur(48px);
      border: 1px solid rgba(255,255,255,0.9);
      border-radius: 26px;
      padding: 28px;
      box-shadow:
        0 24px 64px rgba(0,0,0,.1),
        0 4px 16px rgba(0,0,0,.06),
        inset 0 1px 0 rgba(255,255,255,1);
    }

    .search-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .input-group label {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: var(--text35);
    }

    .input-field {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 12px;
      font-size: 0.93rem;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      -webkit-font-smoothing: antialiased;
    }

    .input-field::placeholder { color: rgba(29,29,31,0.25); }

    .input-field:focus {
      border-color: rgba(52,199,89,.5);
      background: rgba(255,255,255,0.95);
      box-shadow: 0 0 0 3px rgba(52,199,89,.14);
    }

    .search-btn {
      padding: 13px 26px;
      background: var(--text);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: -0.2px;
      transition: opacity 0.18s, transform 0.18s, box-shadow 0.18s;
      box-shadow: 0 4px 14px rgba(0,0,0,.22);
    }

    .search-btn:hover  {
      opacity: 0.82;
      transform: translateY(-1px);
      box-shadow: 0 8px 22px rgba(0,0,0,.28);
    }
    .search-btn:active  { transform: translateY(0); }
    .search-btn:disabled { opacity: 0.3; cursor: default; transform: none; box-shadow: none; }

    .location-btn {
      width: 100%;
      margin-top: 10px;
      padding: 11px 16px;
      background: rgba(255,255,255,0.5);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 12px;
      color: var(--text60);
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: background 0.18s, border-color 0.18s, color 0.18s;
    }
    .location-btn:hover {
      background: rgba(255,255,255,0.85);
      border-color: rgba(0,0,0,0.14);
      color: var(--text);
    }
    .location-btn:disabled { opacity: 0.35; cursor: default; }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 16px;
    }

    .chips-label {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: var(--text35);
      width: 100%;
      margin-bottom: 1px;
    }

    .chip {
      padding: 5px 14px;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 20px;
      background: rgba(255,255,255,0.6);
      font-size: 0.77rem;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      color: var(--text60);
      cursor: pointer;
      transition: all 0.18s ease;
    }

    .chip:hover {
      border-color: rgba(52,199,89,.4);
      color: #1a7f35;
      background: rgba(52,199,89,.08);
      transform: translateY(-1px);
    }

    /* ── Stats bar ─────────────────────────────────────────────────────── */
    .stats-bar {
      position: relative;
      z-index: 10;
      max-width: 760px;
      margin: 0 auto 18px;
      padding: 0 20px;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .stats-inner {
      background: var(--glass);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,.9);
      border-radius: 14px;
      padding: 12px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px 20px;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,.07);
    }

    .stat-item {
      font-size: 0.78rem;
      color: var(--text60);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stat-item strong { color: var(--text); font-weight: 600; }

    .stat-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
      animation: dotBlink 2s ease-in-out infinite;
    }

    @keyframes dotBlink {
      0%, 100% { opacity: 1; box-shadow: 0 0 5px var(--green); }
      50%       { opacity: 0.3; box-shadow: none; }
    }

    .stats-div { color: var(--text15); }

    /* ── Results layout ────────────────────────────────────────────────── */
    .results-wrapper {
      position: relative;
      z-index: 10;
      max-width: 820px;
      margin: 0 auto 100px;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      align-items: start;
    }

    .results-wrapper.has-map {
      max-width: 1360px;
      grid-template-columns: 1fr 400px;
    }

    #results {
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 0;
    }

    /* ── Map panel ─────────────────────────────────────────────────────── */
    .map-panel {
      position: sticky;
      top: 24px;
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.9);
      box-shadow: 0 8px 40px rgba(0,0,0,.1);
    }

    .map-header {
      padding: 13px 18px;
      font-size: 0.77rem;
      font-weight: 500;
      color: var(--text60);
      background: var(--glass);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(0,0,0,.06);
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .map-header span { color: var(--text); font-weight: 600; }

    #map { width: 100%; height: 540px; }

    .leaflet-popup-content-wrapper {
      background: rgba(255,255,255,0.88) !important;
      backdrop-filter: blur(24px) !important;
      border: 1px solid rgba(0,0,0,.08) !important;
      border-radius: 16px !important;
      box-shadow: 0 12px 36px rgba(0,0,0,.14) !important;
      padding: 0 !important;
    }
    .leaflet-popup-content { margin: 0 !important; }
    .leaflet-popup-tip { background: rgba(255,255,255,0.88) !important; }

    /* ── Parking meter loader ──────────────────────────────────────────── */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 72px 16px;
      gap: 20px;
    }

    .meter-light {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: meterBlink 1s ease-in-out infinite;
      margin-bottom: -2px;
    }

    @keyframes meterBlink {
      0%, 100% { opacity: 1; box-shadow: 0 0 10px var(--green); }
      50%       { opacity: 0.2; box-shadow: none; }
    }

    .meter-head {
      width: 56px; height: 72px;
      background: var(--glass);
      backdrop-filter: blur(20px);
      border-radius: 10px 10px 6px 6px;
      border: 1px solid rgba(255,255,255,.9);
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,.1);
    }

    .meter-screen {
      position: absolute;
      top: 9px; left: 8px; right: 8px; bottom: 13px;
      background: rgba(29,29,31,.08);
      border-radius: 5px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .meter-fill-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, var(--green), rgba(52,199,89,.4));
      animation: meterFillUp 2.2s ease-in-out infinite;
    }

    @keyframes meterFillUp {
      0%   { height: 0%; }
      60%  { height: 100%; }
      85%  { height: 100%; }
      100% { height: 0%; }
    }

    .meter-p {
      position: relative;
      z-index: 2;
      font-family: 'Inter', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      mix-blend-mode: multiply;
      user-select: none;
    }

    .meter-coin-slot {
      position: absolute;
      bottom: 4px; left: 50%;
      transform: translateX(-50%);
      width: 18px; height: 2px;
      background: rgba(0,0,0,.1);
      border-radius: 2px;
    }

    .meter-neck { width: 10px; height: 7px; background: rgba(0,0,0,.08); margin: 0 auto; }

    .meter-pole {
      width: 6px; height: 44px;
      background: linear-gradient(to right, rgba(0,0,0,.1), rgba(0,0,0,.06), rgba(0,0,0,.1));
      border-radius: 0 0 4px 4px;
      margin: 0 auto;
    }

    .loading-msg {
      font-size: 0.9rem;
      font-weight: 400;
      color: var(--text60);
      letter-spacing: -0.1px;
      animation: msgIn 0.3s ease both;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Result cards ──────────────────────────────────────────────────── */
    .parking-card {
      background: var(--glass);
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
      border: 1px solid rgba(255,255,255,.9);
      border-radius: 20px;
      padding: 22px 24px;
      position: relative;
      overflow: hidden;
      display: flex;
      gap: 18px;
      align-items: flex-start;
      animation: cardIn 0.5s cubic-bezier(.22,.68,0,1.2) both;
      animation-delay: var(--delay, 0s);
      transition: background 0.2s, box-shadow 0.2s, transform 0.2s;
      box-shadow: 0 4px 20px rgba(0,0,0,.07), inset 0 1px 0 rgba(255,255,255,1);
    }

    .parking-card::before {
      content: '';
      position: absolute;
      left: 0; top: 14px; bottom: 14px;
      width: 3px;
      border-radius: 0 3px 3px 0;
      background: var(--status-color, var(--green));
      opacity: 0.7;
    }

    .parking-card:hover {
      background: var(--glass-h);
      box-shadow: 0 12px 36px rgba(0,0,0,.11), inset 0 1px 0 rgba(255,255,255,1);
      transform: translateY(-3px);
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .spot-number {
      font-size: 2rem;
      font-weight: 800;
      color: var(--status-color, var(--green));
      opacity: 0.12;
      min-width: 48px;
      line-height: 1;
      padding-top: 2px;
      text-align: center;
      flex-shrink: 0;
      letter-spacing: -2px;
    }

    .card-body { flex: 1; min-width: 0; }

    .card-header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .card-address {
      font-size: 0.97rem;
      font-weight: 600;
      line-height: 1.4;
      color: var(--text);
      letter-spacing: -0.2px;
    }

    .card-side {
      font-weight: 400;
      color: var(--text60);
      font-size: 0.84rem;
    }

    .card-landmark {
      font-size: 0.78rem;
      color: var(--text35);
      margin-top: 3px;
      font-style: italic;
    }

    .status-badge {
      font-size: 0.63rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }

    .card-streetview {
      width: 100%; height: 190px;
      object-fit: cover;
      border-radius: 12px;
      margin: 12px 0 4px;
      display: block;
      background: rgba(0,0,0,.04);
      border: 1px solid rgba(0,0,0,.06);
    }

    .sv-disclaimer {
      font-size: 0.7rem;
      color: var(--text35);
      font-style: italic;
      margin: 0 0 12px;
    }

    .card-details { display: flex; flex-wrap: wrap; gap: 6px; }

    .detail-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.73rem;
      color: var(--text60);
      background: rgba(255,255,255,.6);
      padding: 4px 11px;
      border-radius: 20px;
      border: 1px solid rgba(0,0,0,.06);
      white-space: nowrap;
    }

    /* ── Crowdsourced report ───────────────────────────────────────────── */
    .card-report   { margin-top: 14px; border-top: 1px solid rgba(0,0,0,.06); padding-top: 13px; }
    .report-status { min-height: 22px; margin-bottom: 8px; }

    .report-status-badge {
      display: inline-flex;
      align-items: center;
      font-size: 0.74rem;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid;
    }

    .report-actions { display: flex; gap: 8px; }

    .report-btn {
      flex: 1;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid rgba(0,0,0,.08);
      font-size: 0.79rem;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      background: rgba(255,255,255,.5);
      color: var(--text60);
      transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.15s;
    }

    .report-btn:hover    { transform: translateY(-1px); }
    .report-btn:disabled { opacity: 0.3; cursor: default; transform: none; }
    .report-free:hover  { background: rgba(52,199,89,.12); border-color: rgba(52,199,89,.4); color: #1a7f35; }
    .report-taken:hover { background: rgba(255,59,48,.08); border-color: rgba(255,59,48,.35); color: #c0170f; }

    /* ── Message states ────────────────────────────────────────────────── */
    .msg { text-align: center; padding: 64px 16px; color: var(--text60); }
    .msg.error { color: rgba(255,59,48,.8); }
    .msg-icon  { font-size: 2.5rem; margin-bottom: 14px; }
    .msg p     { font-size: 0.9rem; }

    /* ── Footer ────────────────────────────────────────────────────────── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 28px 16px;
      font-size: 0.76rem;
      color: var(--text35);
      border-top: 1px solid rgba(0,0,0,.06);
      letter-spacing: 0.2px;
    }

    footer strong { color: var(--text60); font-weight: 600; }

    /* ── Mobile ────────────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .hero           { padding: 68px 20px 52px; }
      .hero-title     { letter-spacing: -2px; }
      .fun-word       { transform: rotate(-7deg) translateX(8px); }
      .search-card    { padding: 20px 16px; border-radius: 22px; }
      .search-row     { flex-direction: column; }
      .search-btn     { width: 100%; padding: 14px; }
      .stats-inner    { gap: 5px 12px; padding: 10px 14px; }
      .stats-div      { display: none; }
      .parking-card   { gap: 10px; padding: 18px 16px; }
      .spot-number    { font-size: 1.6rem; min-width: 40px; }
      .results-wrapper.has-map { grid-template-columns: 1fr; max-width: 820px; }
      .map-panel      { position: static; }
      #map            { height: 280px; }
    }
  </style>
</head>
<body>

  <div class="bg-scene" aria-hidden="true"></div>

  <!-- Hero -->
  <header class="hero">
    <div class="logo-mark">P</div>
    <p class="hero-label">Free Street Parking</p>

    <div class="title-block">
      <h1 class="hero-title">Park<span>Me</span></h1>

      <div class="fun-word" aria-label="fun">
        <div class="fun-text">
          <span class="f">f</span><span class="u">u</span><span class="n">n</span>
        </div>
        <!-- Squiggly underline -->
        <svg class="fun-squiggle" viewBox="0 0 80 10" preserveAspectRatio="none">
          <defs>
            <linearGradient id="squiggleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%"   stop-color="#FF9F0A"/>
              <stop offset="50%"  stop-color="#34C759"/>
              <stop offset="100%" stop-color="#0A84FF"/>
            </linearGradient>
          </defs>
          <path d="M0,5 C10,0 15,10 25,5 C35,0 40,10 50,5 C60,0 65,10 75,5 C77,4 79,4.5 80,5"/>
        </svg>
      </div>
    </div>

    <p class="hero-sub">Find free street parking near you — instantly.</p>
  </header>

  <!-- Search -->
  <section class="search-section">
    <div class="search-card">
      <div class="search-row">
        <div class="input-group">
          <label for="city-input">City</label>
          <input id="city-input" class="input-field" type="text"
                 placeholder="Jersey City, NJ" autocomplete="off" />
        </div>
        <div class="input-group">
          <label for="street-input">Street or Address</label>
          <input id="street-input" class="input-field" type="text"
                 placeholder="175 2nd St  or  near Mango Mango" autocomplete="off" />
        </div>
        <button id="search-btn" class="search-btn">Search →</button>
      </div>
      <button id="location-btn" class="location-btn">📍 Use My Current Location</button>
      <div class="chips">
        <span class="chips-label">Popular cities</span>
        <button class="chip" data-city="Jersey City, NJ">Jersey City, NJ</button>
        <button class="chip" data-city="New York, NY">New York, NY</button>
        <button class="chip" data-city="Chicago, IL">Chicago, IL</button>
        <button class="chip" data-city="Boston, MA">Boston, MA</button>
        <button class="chip" data-city="Austin, TX">Austin, TX</button>
      </div>
    </div>
  </section>

  <!-- Stats bar -->
  <div class="stats-bar" id="stats-bar" hidden>
    <div class="stats-inner">
      <span class="stat-item">
        <span class="stat-dot"></span>
        <strong id="stat-count">0</strong>&nbsp;free spots found
      </span>
      <span class="stats-div">·</span>
      <span class="stat-item">📍 Near <strong id="stat-street">–</strong></span>
      <span class="stats-div">·</span>
      <span class="stat-item">🏙️ <strong id="stat-city">–</strong></span>
      <span class="stats-div">·</span>
      <span class="stat-item">🕐 <strong id="stat-time">–</strong></span>
    </div>
  </div>

  <!-- Results + Map -->
  <div class="results-wrapper" id="results-wrapper">
    <div id="results"></div>
    <aside class="map-panel" id="map-panel" hidden>
      <div class="map-header">
        🗺 <span id="map-spot-count">0 spots</span> on map &nbsp;·&nbsp; click a pin for details
      </div>
      <div id="map"></div>
    </aside>
  </div>

  <!-- Footer -->
  <footer>
    <strong>ParkMe</strong> &ensp;·&ensp; © 2026 &ensp;·&ensp; Always verify posted signs before parking
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
