<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ParkMe – Find Free Street Parking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:   #30D158;
      --amber:   #FFD60A;
      --red:     #FF453A;
      --white:   #F5F5F7;
      --white60: rgba(245,245,247,0.6);
      --white30: rgba(245,245,247,0.3);
      --white12: rgba(245,245,247,0.12);
      --white08: rgba(245,245,247,0.08);
      --white06: rgba(245,245,247,0.06);
      --border:  rgba(255,255,255,0.1);
      --glass:   rgba(255,255,255,0.07);
      --glass-h: rgba(255,255,255,0.11);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000;
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Ambient background ────────────────────────────────────────────── */
    .bg-scene {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .bg-scene::before {
      content: '';
      position: absolute;
      top: -20%; left: -10%;
      width: 70vw; height: 70vw;
      background: radial-gradient(circle, rgba(48,209,88,.12) 0%, transparent 60%);
      animation: driftA 18s ease-in-out infinite alternate;
    }
    .bg-scene::after {
      content: '';
      position: absolute;
      bottom: -10%; right: -10%;
      width: 60vw; height: 60vw;
      background: radial-gradient(circle, rgba(10,132,255,.09) 0%, transparent 60%);
      animation: driftB 22s ease-in-out infinite alternate;
    }
    @keyframes driftA {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(6vw, 8vh) scale(1.1); }
    }
    @keyframes driftB {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(-5vw, -6vh) scale(1.08); }
    }

    /* ── Hero ──────────────────────────────────────────────────────────── */
    .hero {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 100px 24px 80px;
    }

    .logo-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px; height: 52px;
      border-radius: 14px;
      background: var(--glass);
      border: 1px solid var(--border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      margin-bottom: 28px;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--green);
      font-family: 'Inter', sans-serif;
      box-shadow: 0 0 0 1px rgba(48,209,88,.2), inset 0 1px 0 rgba(255,255,255,.08);
    }

    .hero-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 18px;
      opacity: 0.9;
    }

    .hero-title {
      font-size: clamp(3rem, 8vw, 5.5rem);
      font-weight: 700;
      letter-spacing: -2.5px;
      line-height: 1.05;
      color: var(--white);
      margin-bottom: 20px;
    }

    .hero-title span {
      color: var(--green);
    }

    .hero-sub {
      font-size: clamp(1rem, 2vw, 1.2rem);
      font-weight: 400;
      color: var(--white60);
      letter-spacing: -0.2px;
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ── Search card ───────────────────────────────────────────────────── */
    .search-section {
      position: relative;
      z-index: 10;
      max-width: 760px;
      margin: 0 auto 0;
      padding: 0 20px 64px;
    }

    .search-card {
      background: var(--glass);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px;
      box-shadow:
        0 32px 80px rgba(0,0,0,.5),
        inset 0 1px 0 rgba(255,255,255,.1);
    }

    .search-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .input-group label {
      font-size: 0.63rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--white30);
    }

    .input-field {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      font-size: 0.93rem;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      color: var(--white);
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      -webkit-font-smoothing: antialiased;
    }

    .input-field::placeholder { color: rgba(245,245,247,0.25); }

    .input-field:focus {
      border-color: rgba(48,209,88,.5);
      background: rgba(255,255,255,0.09);
      box-shadow: 0 0 0 3px rgba(48,209,88,.12);
    }

    .search-btn {
      padding: 13px 26px;
      background: var(--green);
      color: #000;
      border: none;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: -0.2px;
      transition: opacity 0.18s, transform 0.18s, box-shadow 0.18s;
      box-shadow: 0 4px 20px rgba(48,209,88,.3);
    }

    .search-btn:hover  {
      opacity: 0.88;
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(48,209,88,.4);
    }
    .search-btn:active  { transform: translateY(0); }
    .search-btn:disabled { opacity: 0.3; cursor: default; transform: none; box-shadow: none; }

    .location-btn {
      width: 100%;
      margin-top: 10px;
      padding: 11px 16px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: var(--white60);
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: background 0.18s, border-color 0.18s, color 0.18s;
    }
    .location-btn:hover {
      background: var(--white06);
      border-color: rgba(255,255,255,0.18);
      color: var(--white);
    }
    .location-btn:disabled { opacity: 0.3; cursor: default; }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 16px;
    }

    .chips-label {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: var(--white30);
      width: 100%;
      margin-bottom: 1px;
    }

    .chip {
      padding: 5px 14px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      background: transparent;
      font-size: 0.77rem;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      color: var(--white60);
      cursor: pointer;
      transition: all 0.18s ease;
    }

    .chip:hover {
      border-color: rgba(48,209,88,.4);
      color: var(--green);
      background: rgba(48,209,88,.08);
    }

    /* ── Stats bar ─────────────────────────────────────────────────────── */
    .stats-bar {
      position: relative;
      z-index: 10;
      max-width: 760px;
      margin: 0 auto 20px;
      padding: 0 20px;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .stats-inner {
      background: var(--glass);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px 20px;
      align-items: center;
      justify-content: center;
    }

    .stat-item {
      font-size: 0.78rem;
      color: var(--white60);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stat-item strong { color: var(--white); font-weight: 600; }

    .stat-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
      animation: dotBlink 2s ease-in-out infinite;
    }

    @keyframes dotBlink {
      0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--green); }
      50%       { opacity: 0.3; box-shadow: none; }
    }

    .stats-div { color: rgba(255,255,255,.15); }

    /* ── Results layout ────────────────────────────────────────────────── */
    .results-wrapper {
      position: relative;
      z-index: 10;
      max-width: 820px;
      margin: 0 auto 100px;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      align-items: start;
    }

    .results-wrapper.has-map {
      max-width: 1360px;
      grid-template-columns: 1fr 400px;
    }

    #results {
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 0;
    }

    /* ── Map panel ─────────────────────────────────────────────────────── */
    .map-panel {
      position: sticky;
      top: 24px;
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 8px 40px rgba(0,0,0,.5);
    }

    .map-header {
      padding: 13px 18px;
      font-size: 0.77rem;
      font-weight: 500;
      color: var(--white60);
      background: rgba(20,20,20,0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .map-header span { color: var(--white); font-weight: 600; }

    #map { width: 100%; height: 540px; }

    .leaflet-popup-content-wrapper {
      background: rgba(20,20,22,0.92) !important;
      backdrop-filter: blur(20px) !important;
      border: 1px solid rgba(255,255,255,.12) !important;
      border-radius: 16px !important;
      box-shadow: 0 12px 40px rgba(0,0,0,.6) !important;
      padding: 0 !important;
    }
    .leaflet-popup-content { margin: 0 !important; }
    .leaflet-popup-tip     { background: rgba(20,20,22,0.92) !important; }

    /* ── Parking meter loader ──────────────────────────────────────────── */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 72px 16px;
      gap: 20px;
    }

    .meter-light {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 10px var(--green);
      animation: meterBlink 1s ease-in-out infinite;
      margin-bottom: -2px;
    }

    @keyframes meterBlink {
      0%, 100% { opacity: 1; box-shadow: 0 0 12px var(--green); }
      50%       { opacity: 0.2; box-shadow: none; }
    }

    .meter-head {
      width: 56px; height: 72px;
      background: var(--glass);
      backdrop-filter: blur(20px);
      border-radius: 10px 10px 6px 6px;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .meter-screen {
      position: absolute;
      top: 9px; left: 8px; right: 8px; bottom: 13px;
      background: rgba(0,0,0,.6);
      border-radius: 5px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .meter-fill-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, var(--green), rgba(48,209,88,.4));
      animation: meterFillUp 2.2s ease-in-out infinite;
    }

    @keyframes meterFillUp {
      0%   { height: 0%; }
      60%  { height: 100%; }
      85%  { height: 100%; }
      100% { height: 0%; }
    }

    .meter-p {
      position: relative;
      z-index: 2;
      font-family: 'Inter', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: white;
      mix-blend-mode: difference;
      user-select: none;
    }

    .meter-coin-slot {
      position: absolute;
      bottom: 4px; left: 50%;
      transform: translateX(-50%);
      width: 18px; height: 2px;
      background: rgba(255,255,255,.15);
      border-radius: 2px;
    }

    .meter-neck { width: 10px; height: 7px; background: rgba(255,255,255,.08); margin: 0 auto; }

    .meter-pole {
      width: 6px; height: 44px;
      background: linear-gradient(to right, rgba(255,255,255,.12), rgba(255,255,255,.06), rgba(255,255,255,.12));
      border-radius: 0 0 4px 4px;
      margin: 0 auto;
    }

    .loading-msg {
      font-size: 0.9rem;
      font-weight: 400;
      color: var(--white60);
      letter-spacing: -0.1px;
      animation: msgIn 0.3s ease both;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Result cards ──────────────────────────────────────────────────── */
    .parking-card {
      background: var(--glass);
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 22px 24px;
      border-left: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      display: flex;
      gap: 18px;
      align-items: flex-start;
      animation: cardIn 0.5s cubic-bezier(.22,.68,0,1.2) both;
      animation-delay: var(--delay, 0s);
      transition: background 0.2s, box-shadow 0.2s, transform 0.2s;
      box-shadow: 0 2px 20px rgba(0,0,0,.3);
    }

    /* Left color accent */
    .parking-card::before {
      content: '';
      position: absolute;
      left: 0; top: 16px; bottom: 16px;
      width: 3px;
      border-radius: 0 3px 3px 0;
      background: var(--status-color, var(--green));
      opacity: 0.8;
    }

    .parking-card:hover {
      background: var(--glass-h);
      box-shadow: 0 8px 40px rgba(0,0,0,.45);
      transform: translateY(-3px);
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .spot-number {
      font-size: 2rem;
      font-weight: 700;
      color: var(--status-color, var(--green));
      opacity: 0.15;
      min-width: 48px;
      line-height: 1;
      padding-top: 2px;
      text-align: center;
      flex-shrink: 0;
      letter-spacing: -1px;
    }

    .card-body { flex: 1; min-width: 0; }

    .card-header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .card-address {
      font-size: 0.97rem;
      font-weight: 600;
      line-height: 1.4;
      color: var(--white);
      letter-spacing: -0.2px;
    }

    .card-side {
      font-weight: 400;
      color: var(--white60);
      font-size: 0.84rem;
    }

    .card-landmark {
      font-size: 0.78rem;
      color: var(--white30);
      margin-top: 3px;
      font-style: italic;
    }

    .status-badge {
      font-size: 0.63rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }

    .card-streetview {
      width: 100%; height: 190px;
      object-fit: cover;
      border-radius: 12px;
      margin: 12px 0 4px;
      display: block;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
    }

    .sv-disclaimer {
      font-size: 0.7rem;
      color: var(--white30);
      font-style: italic;
      margin: 0 0 12px;
    }

    .card-details { display: flex; flex-wrap: wrap; gap: 6px; }

    .detail-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.73rem;
      color: var(--white60);
      background: rgba(255,255,255,.05);
      padding: 4px 11px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,.07);
      white-space: nowrap;
    }

    /* ── Crowdsourced report ───────────────────────────────────────────── */
    .card-report   { margin-top: 14px; border-top: 1px solid rgba(255,255,255,.07); padding-top: 13px; }
    .report-status { min-height: 22px; margin-bottom: 8px; }

    .report-status-badge {
      display: inline-flex;
      align-items: center;
      font-size: 0.74rem;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid;
    }

    .report-actions { display: flex; gap: 8px; }

    .report-btn {
      flex: 1;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.12);
      font-size: 0.79rem;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      background: rgba(255,255,255,.04);
      color: var(--white60);
      transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.15s;
    }

    .report-btn:hover    { transform: translateY(-1px); }
    .report-btn:disabled { opacity: 0.25; cursor: default; transform: none; }

    .report-free:hover  { background: rgba(48,209,88,.12); border-color: rgba(48,209,88,.4); color: var(--green); }
    .report-taken:hover { background: rgba(255,69,58,.1); border-color: rgba(255,69,58,.4); color: var(--red); }

    /* ── Message states ────────────────────────────────────────────────── */
    .msg { text-align: center; padding: 64px 16px; color: var(--white60); }
    .msg.error { color: rgba(255,69,58,.8); }
    .msg-icon  { font-size: 2.5rem; margin-bottom: 14px; }
    .msg p     { font-size: 0.9rem; }

    /* ── Footer ────────────────────────────────────────────────────────── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 28px 16px;
      font-size: 0.76rem;
      color: var(--white30);
      border-top: 1px solid rgba(255,255,255,.06);
      letter-spacing: 0.2px;
    }

    footer strong { color: var(--white60); font-weight: 500; }

    /* ── Mobile ────────────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .hero          { padding: 72px 20px 56px; }
      .hero-title    { letter-spacing: -1.5px; }
      .search-card   { padding: 20px 16px; border-radius: 20px; }
      .search-row    { flex-direction: column; }
      .search-btn    { width: 100%; padding: 14px; }
      .stats-inner   { gap: 5px 12px; padding: 10px 14px; }
      .stats-div     { display: none; }
      .parking-card  { gap: 10px; padding: 18px 16px; }
      .spot-number   { font-size: 1.6rem; min-width: 40px; }
      .results-wrapper.has-map { grid-template-columns: 1fr; max-width: 820px; }
      .map-panel     { position: static; }
      #map           { height: 280px; }
    }
  </style>
</head>
<body>

  <div class="bg-scene" aria-hidden="true"></div>

  <!-- Hero -->
  <header class="hero">
    <div class="logo-mark">P</div>
    <p class="hero-label">Free Street Parking</p>
    <h1 class="hero-title">Park<span>Me</span></h1>
    <p class="hero-sub">Find free street parking near you — instantly.</p>
  </header>

  <!-- Search -->
  <section class="search-section">
    <div class="search-card">
      <div class="search-row">
        <div class="input-group">
          <label for="city-input">City</label>
          <input id="city-input" class="input-field" type="text"
                 placeholder="Jersey City, NJ" autocomplete="off" />
        </div>
        <div class="input-group">
          <label for="street-input">Street or Address</label>
          <input id="street-input" class="input-field" type="text"
                 placeholder="175 2nd St  or  near Mango Mango" autocomplete="off" />
        </div>
        <button id="search-btn" class="search-btn">Search →</button>
      </div>
      <button id="location-btn" class="location-btn">📍 Use My Current Location</button>
      <div class="chips">
        <span class="chips-label">Popular cities</span>
        <button class="chip" data-city="Jersey City, NJ">Jersey City, NJ</button>
        <button class="chip" data-city="New York, NY">New York, NY</button>
        <button class="chip" data-city="Chicago, IL">Chicago, IL</button>
        <button class="chip" data-city="Boston, MA">Boston, MA</button>
        <button class="chip" data-city="Austin, TX">Austin, TX</button>
      </div>
    </div>
  </section>

  <!-- Stats bar -->
  <div class="stats-bar" id="stats-bar" hidden>
    <div class="stats-inner">
      <span class="stat-item">
        <span class="stat-dot"></span>
        <strong id="stat-count">0</strong>&nbsp;free spots found
      </span>
      <span class="stats-div">·</span>
      <span class="stat-item">📍 Near <strong id="stat-street">–</strong></span>
      <span class="stats-div">·</span>
      <span class="stat-item">🏙️ <strong id="stat-city">–</strong></span>
      <span class="stats-div">·</span>
      <span class="stat-item">🕐 <strong id="stat-time">–</strong></span>
    </div>
  </div>

  <!-- Results + Map -->
  <div class="results-wrapper" id="results-wrapper">
    <div id="results"></div>
    <aside class="map-panel" id="map-panel" hidden>
      <div class="map-header">
        🗺 <span id="map-spot-count">0 spots</span> on map &nbsp;·&nbsp; click a pin for details
      </div>
      <div id="map"></div>
    </aside>
  </div>
